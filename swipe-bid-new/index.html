<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SwipeBid - The Modern Auction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0d',
                        surface: '#18181c',
                        accent: '#2563eb',
                        success: '#10b981',
                        danger: '#f43f5e'
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background-color: #0a0a0d; color: white; margin: 0; padding: 0; overflow: hidden; overscroll-behavior-y: none; touch-action: none; }
        
        /* Utility */
        .glass-panel { background: rgba(24, 24, 28, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        /* Screens */
        .app-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; overflow: hidden; background: #0a0a0d; z-index: 10; padding-bottom: 85px; }
        .app-screen.active { display: flex; animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Home Stack */
        .stack-container { position: relative; width: 100%; height: 68vh; margin-top: 10vh; perspective: 1000px; display: flex; justify-content: center; z-index: 10; }
        .swipe-card { position: absolute; width: 92%; height: 100%; border-radius: 24px; background: #18181c; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8); overflow: hidden; transform-origin: center bottom; will-change: transform; border: 1px solid rgba(255,255,255,0.1); }
        .card-img-wrapper { position: relative; width: 100%; height: 60%; }
        .card-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .card-img-gradient { position: absolute; bottom: 0; left: 0; width: 100%; height: 50%; background: linear-gradient(to top, #18181c 0%, transparent 100%); }
        .card-details { position: absolute; bottom: 0; width: 100%; height: 45%; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        
        .badge { position: absolute; top: 30px; padding: 8px 16px; border-radius: 8px; font-weight: 900; font-size: 24px; letter-spacing: 1px; border: 4px solid; z-index: 100; opacity: 0; text-transform: uppercase; }
        .badge.like { right: 30px; color: #10b981; border-color: #10b981; transform: rotate(15deg); }
        .badge.nope { left: 30px; color: #f43f5e; border-color: #f43f5e; transform: rotate(-15deg); }
        .badge.superlike { top: auto; bottom: 45%; left: 50%; transform: translateX(-50%); color: #38bdf8; border-color: #38bdf8; }

        /* List Items */
        .list-row { background: #18181c; border-radius: 20px; margin-bottom: 12px; display: flex; align-items: center; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .list-row-fg { background: #18181c; border-radius: 20px; width: 100%; display: flex; padding: 12px; gap: 16px; position: relative; z-index: 2; touch-action: pan-y; }
        .list-row-bg { position: absolute; inset: 0; border-radius: 20px; display: flex; align-items: center; padding: 0 24px; font-weight: 800; font-size: 18px; z-index: 1; }
        .list-enter { color: #10b981; margin-right: auto; display: none; }
        .list-remove { color: #f43f5e; margin-left: auto; display: none; }
        .list-row-img { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; }

        /* Auction Room */
        .auction-room { background: #000; padding: 0; }
        .auction-hero { height: 45vh; position: absolute; top:0; width: 100%; z-index: 0;}
        .auction-hero img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; mask-image: linear-gradient(to bottom, black 50%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%); }
        .auction-main { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; padding: 20px; justify-content: flex-end; }
        
        .bid-feed { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 20px; overflow: hidden; pointer-events: none; }
        .feed-item { margin-top: 8px; animation: slideIn 0.3s ease forwards; transform: translateY(10px); opacity: 0; font-weight: 600; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; border-radius: 12px; background: rgba(255,255,255,0.05); backdrop-filter: blur(5px); }
        .feed-item.me { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: #10b981; }
        @keyframes slideIn { to { transform: translateY(0); opacity: 1; } }

        .bid-pad { background: rgba(24, 24, 28, 0.9); backdrop-filter: blur(20px); border-radius: 32px; padding: 32px 24px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); position: relative; z-index: 20; touch-action: none; }
        .bid-cta { width: 110px; height: 110px; margin: 0 auto; border-radius: 50%; background: linear-gradient(135deg, #2563eb, #1d4ed8); display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; color: white; position: relative; will-change: transform; transition: transform 0.1s; }
        .bid-cta::before { content: ''; position: absolute; inset: -10px; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.2); animation: spin 10s linear infinite; pointer-events: none;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .swipe-up-arrows i { animation: fadeUpArrows 1.5s infinite; }
        .swipe-up-arrows i:nth-child(2) { animation-delay: 0.2s; }
        .swipe-up-arrows i:nth-child(3) { animation-delay: 0.4s; }
        @keyframes fadeUpArrows { 0% { opacity: 0.2; transform: translateY(2px); } 50% { opacity: 1; transform: translateY(-2px); } 100% { opacity: 0.2; transform: translateY(2px); } }

        .haptic-flash { position: fixed; inset: 0; background: #10b981; opacity: 0; pointer-events: none; z-index: 9999; }
        .flash-active { animation: hapticPulse 0.4s cubic-bezier(0.1, 0.8, 0.3, 1); }
        @keyframes hapticPulse { 0% { opacity: 0.5; } 100% { opacity: 0; } }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; padding-bottom: env(safe-area-inset-bottom); z-index: 50; padding-top: 12px; padding-bottom: 24px; border-radius: 30px 30px 0 0; }
        .nav-link { color: #64748b; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 600; gap: 4px; position: relative; }
        .nav-link.active { color: #fff; }
        .nav-link.active i { color: #3b82f6; transform: translateY(-2px) scale(1.1); }
        .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: #3b82f6; position: absolute; bottom: -8px; opacity: 0; transition: 0.2s; }
        .nav-link.active .nav-dot { opacity: 1; }

    </style>
</head>
<body>

    <div id="app">
        <!-- HEADER -->
        <header class="fixed top-0 w-full z-40 px-6 pt-12 pb-4 flex justify-between items-center bg-gradient-to-b from-dark to-transparent pointer-events-none">
            <div class="text-xl font-black tracking-tighter" id="global-title">DISCOVER</div>
            <div class="flex items-center gap-2 pointer-events-auto glass-panel px-3 py-1.5 rounded-full text-xs font-bold shadow-lg">
                <div class="w-2 h-2 bg-success rounded-full animate-pulse"></div>
                <span>4.2K LIVE</span>
            </div>
        </header>

        <!-- DISCOVER SCREEN -->
        <main id="screen-home" class="app-screen active">
            <div class="stack-container" id="card-stack"></div>
            <div class="flex justify-center items-center gap-8 mt-6 z-20">
                <button class="w-14 h-14 rounded-full bg-surface border border-white/10 text-danger text-2xl shadow-lg hover:scale-105 active:scale-95 transition" onclick="btnSwipe('left')">
                    <i class="fas fa-times"></i>
                </button>
                <button class="w-12 h-12 rounded-full bg-surface border border-white/10 text-sky-400 text-xl shadow-lg hover:scale-105 active:scale-95 transition" onclick="btnSwipe('up')">
                    <i class="fas fa-star"></i>
                </button>
                <button class="w-14 h-14 rounded-full bg-surface border border-white/10 text-success text-2xl shadow-lg hover:scale-105 active:scale-95 transition" onclick="btnSwipe('right')">
                    <i class="fas fa-heart"></i>
                </button>
            </div>
        </main>

        <!-- BID LIST SCREEN -->
        <main id="screen-bids" class="app-screen pt-28 px-6">
            <p class="text-slate-400 text-sm font-medium mb-6">Swipe right to bid. Swipe left to remove.</p>
            <div id="bid-list-ctr" class="overflow-y-auto h-full hide-scroll pb-20 space-y-3">
                <div class="text-center text-slate-500 mt-20" id="empty-state">
                    <i class="fas fa-box-open text-4xl mb-4 opacity-50"></i>
                    <p class="font-medium">Your bid list is empty</p>
                </div>
            </div>
        </main>

        <!-- AUCTION ROOM -->
        <main id="screen-auction" class="app-screen auction-room z-50">
            <div class="auction-hero"><img id="auc-img" src=""></div>
            
            <button class="absolute top-12 right-6 z-50 w-10 h-10 rounded-full glass-panel flex items-center justify-center text-white" onclick="closeAuction()">
                <i class="fas fa-arrow-down"></i>
            </button>

            <div class="absolute top-12 left-6 z-50">
                <div class="bg-danger text-white text-[10px] uppercase font-black px-2 py-1 rounded border border-danger shadow-[0_0_10px_rgba(244,63,94,0.5)] animate-pulse inline-block mb-2">LIVE NOW</div>
                <div class="text-xl font-bold" id="auc-title">Vehicle Title</div>
                <div class="text-sm text-slate-300 mt-1"><i class="fas fa-eye text-sky-400 mr-1"></i> <span id="auc-watchers">0</span> watching</div>
            </div>

            <div class="auction-main">
                <div class="bid-feed" id="auc-feed"></div>

                <div class="bid-pad" id="bid-area">
                    <div class="text-center mb-6">
                        <div class="text-xs font-bold text-slate-400 tracking-widest uppercase mb-1">Current Highest Bid</div>
                        <div class="text-5xl font-black tracking-tighter text-success flex justify-center items-start gap-1">
                            <span class="text-2xl mt-1">$</span><span id="auc-price">0</span>
                        </div>
                        <div class="mt-4 text-sm font-bold text-danger flex items-center justify-center gap-2" id="auc-timer">
                            <i class="fas fa-stopwatch animate-bounce"></i> Going Once...
                        </div>
                    </div>

                    <div class="relative w-full max-w-[200px] mx-auto z-20">
                        <div class="bid-cta" id="swipe-bid-btn">
                            <div class="flex flex-col items-center">
                                <div class="flex flex-col -space-y-2 mb-1 swipe-up-arrows">
                                    <i class="fas fa-chevron-up text-[10px]"></i>
                                    <i class="fas fa-chevron-up text-xs"></i>
                                    <i class="fas fa-chevron-up text-sm"></i>
                                </div>
                                <span>BID</span>
                                <span class="text-[10px] mt-1 text-white/70 tracking-normal" id="auc-next-step">+$100</span>
                            </div>
                        </div>
                    </div>

                    <div id="cancel-hint" class="absolute bottom-4 left-0 w-full text-center text-[10px] text-slate-500 font-bold uppercase tracking-wider opacity-0 transition-opacity flex items-center justify-center gap-2">
                        <i class="fas fa-arrow-down"></i> Swipe down to cancel bid
                    </div>
                </div>
            </div>
        </main>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav glass-panel" id="nav-bar">
            <div class="flex justify-around items-center px-4">
                <div class="nav-link active" onclick="navTo('home')" data-tab="home">
                    <i class="fas fa-layer-group text-xl"></i>
                    <span>Discover</span>
                    <div class="nav-dot"></div>
                </div>
                <div class="nav-link relative" onclick="navTo('bids')" data-tab="bids">
                    <i class="fas fa-gavel text-xl"></i>
                    <span>Bids</span>
                    <div class="absolute -top-1 right-2 bg-success text-white w-4 h-4 text-[9px] font-black rounded-full flex items-center justify-center hidden" id="bid-badge">0</div>
                    <div class="nav-dot"></div>
                </div>
                <div class="nav-link" onclick="navTo('wishlist')" data-tab="wishlist">
                    <i class="fas fa-star text-xl"></i>
                    <span>Values</span>
                    <div class="nav-dot"></div>
                </div>
                <div class="nav-link" onclick="navTo('profile')" data-tab="profile">
                    <i class="fas fa-user-circle text-xl"></i>
                    <span>Profile</span>
                    <div class="nav-dot"></div>
                </div>
            </div>
        </nav>

        <div id="haptic-overlay" class="haptic-flash"></div>
    </div>

    <script>
        const MOCK_DATA = [
            { id: 1, title: '2023 Tesla Model 3', loc: 'CA - SAN JOSE', price: 28500, img: 'https://images.unsplash.com/photo-1560958089-b8a1929cea89?q=80&w=800&auto=format&fit=crop', odo: '12K mi', damage: 'Low Water' },
            { id: 2, title: '2021 Ford Mustang GT', loc: 'TX - DALLAS', price: 18000, img: 'https://images.unsplash.com/photo-1584345604476-8cc5e3e505ad?q=80&w=800&auto=format&fit=crop', odo: '34K mi', damage: 'Rear End' },
            { id: 3, title: '2020 Porsche 911', loc: 'FL - MIAMI', price: 65000, img: 'https://images.unsplash.com/photo-1503376710356-6e8690e8ba3b?q=80&w=800&auto=format&fit=crop', odo: '8K mi', damage: 'Flood' },
            { id: 4, title: '2022 Rivian R1T', loc: 'CO - DENVER', price: 42000, img: 'https://images.unsplash.com/photo-1692257256561-6dff61cbdb19?q=80&w=800&auto=format&fit=crop', odo: '15K mi', damage: 'Front End' },
            { id: 5, title: '2019 Jeep Wrangler', loc: 'AZ - PHOENIX', price: 15500, img: 'https://images.unsplash.com/photo-1533473359331-0135ef1b58bf?q=80&w=800&auto=format&fit=crop', odo: '55K mi', damage: 'Rollover' }
        ];

        let deck = [...MOCK_DATA].reverse();
        let domCards = [];
        let shortlist = [];

        // DOM Setup
        const cardStack = document.getElementById('card-stack');
        const hapticEl = document.getElementById('haptic-overlay');

        function initDeck() {
            cardStack.innerHTML = '';
            domCards = [];
            deck.forEach((car, i) => {
                const el = document.createElement('div');
                el.className = 'swipe-card';
                el.dataset.id = car.id;
                
                const isTop = (i === deck.length - 1);
                const fromTop = (deck.length - 1) - i;
                
                el.style.transform = `translateY(${fromTop * 15}px) scale(${1 - fromTop * 0.05})`;
                el.style.zIndex = 100 - fromTop;
                el.style.opacity = fromTop > 2 ? 0 : 1;

                el.innerHTML = `
                    <div class="badge like">BID LIST</div>
                    <div class="badge nope">PASS</div>
                    <div class="badge superlike">WISHLIST</div>
                    <div class="card-img-wrapper">
                        <img src="${car.img}">
                        <div class="card-img-gradient"></div>
                    </div>
                    <div class="card-details">
                        <div>
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-2xl font-black leading-tight w-2/3">${car.title}</h3>
                                <div class="text-right">
                                    <div class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Current</div>
                                    <div class="text-xl font-mono text-success font-black">$${car.price.toLocaleString()}</div>
                                </div>
                            </div>
                            <p class="text-slate-400 text-sm font-medium"><i class="fas fa-map-marker-alt text-sky-500 w-4"></i> ${car.loc}</p>
                        </div>
                        <div class="flex gap-2 flex-wrap mb-2">
                            <span class="tag bg-danger/10 text-danger border border-danger/20"><i class="fas fa-car-crash mr-1"></i> ${car.damage}</span>
                            <span class="tag bg-white/5 text-white"><i class="fas fa-tachometer-alt mr-1"></i> ${car.odo}</span>
                            <span class="tag bg-success/10 text-success border border-success/20"><i class="fas fa-fire mr-1"></i> LIVE ROW</span>
                        </div>
                    </div>
                `;
                if(isTop) attachSwipe(el);
                cardStack.appendChild(el);
                domCards.push(el);
            });
        }

        function attachSwipe(el) {
            let startX, startY, currentX = 0, currentY = 0, isDragging = false;
            const w = cardStack.clientWidth;
            const likeB = el.querySelector('.like'), nopeB = el.querySelector('.nope'), superB = el.querySelector('.superlike');

            const start = (e) => {
                isDragging = true; el.style.transition = 'none';
                startX = e.touches ? e.touches[0].clientX : e.clientX;
                startY = e.touches ? e.touches[0].clientY : e.clientY;
            };

            const move = (e) => {
                if(!isDragging) return;
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                currentX = x - startX; currentY = y - startY;
                
                el.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${currentX * 0.05}deg)`;
                
                likeB.style.opacity = nopeB.style.opacity = superB.style.opacity = 0;
                if (Math.abs(currentX) > Math.abs(currentY)) {
                    if (currentX > 0) likeB.style.opacity = Math.min(currentX / 100, 1);
                    else nopeB.style.opacity = Math.min(Math.abs(currentX) / 100, 1);
                } else if (currentY < -50) {
                    superB.style.opacity = Math.min(Math.abs(currentY) / 100, 1);
                }
            };

            const end = () => {
                if(!isDragging) return; isDragging = false;
                el.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                const ax = Math.abs(currentX), ay = Math.abs(currentY);
                const car = MOCK_DATA.find(c => c.id == el.dataset.id);

                if (ax > w/3 && ax > ay) {
                    const dir = currentX > 0 ? 1 : -1;
                    el.style.transform = `translate(${w*1.5*dir}px, ${currentY}px) rotate(${dir*30}deg)`;
                    if(dir > 0) handleLike(car);
                    setTimeout(() => completeSwipe(), 300);
                } else if (currentY < -100 && ay > ax) {
                    el.style.transform = `translate(${currentX}px, -1000px)`;
                    fireHaptic('#38bdf8');
                    setTimeout(() => completeSwipe(), 300);
                } else {
                    el.style.transform = `translate(0,0) rotate(0deg)`;
                    likeB.style.opacity = nopeB.style.opacity = superB.style.opacity = 0;
                }
                currentX = currentY = 0;
            };

            el.addEventListener('touchstart', start, {passive:true});
            window.addEventListener('touchmove', move, {passive:true});
            window.addEventListener('touchend', end);
            el.addEventListener('mousedown', start, {passive:true});
            window.addEventListener('mousemove', move, {passive:true});
            window.addEventListener('mouseup', end);
        }

        function btnSwipe(dir) {
            if(!domCards.length) return;
            const topEl = domCards[domCards.length-1];
            const car = MOCK_DATA.find(c => c.id == topEl.dataset.id);
            topEl.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            const w = cardStack.clientWidth;

            if(dir === 'right') {
                topEl.querySelector('.like').style.opacity = 1;
                topEl.style.transform = `translate(${w*1.5}px, -50px) rotate(30deg)`;
                handleLike(car);
            } else if(dir === 'left') {
                topEl.querySelector('.nope').style.opacity = 1;
                topEl.style.transform = `translate(-${w*1.5}px, -50px) rotate(-30deg)`;
            } else if(dir === 'up') {
                topEl.querySelector('.superlike').style.opacity = 1;
                topEl.style.transform = `translate(0, -1000px)`;
                fireHaptic('#38bdf8');
            }
            setTimeout(() => completeSwipe(), 300);
        }

        function completeSwipe() {
            domCards.pop().remove();
            deck.pop();
            domCards.forEach((c, i) => {
                const ft = (domCards.length - 1) - i;
                c.style.transform = `translateY(${ft * 15}px) scale(${1 - ft * 0.05})`;
                c.style.opacity = ft > 2 ? 0 : 1;
                if(i === domCards.length - 1) attachSwipe(c);
            });
            if(!deck.length) {
                cardStack.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-500 font-bold"><i class="fas fa-check-circle text-5xl mb-4 text-surface border border-slate-700 rounded-full"></i>You're all caught up!</div>`;
            }
        }

        function handleLike(car) {
            fireHaptic('#10b981');
            if(!shortlist.find(c => c.id === car.id)) {
                shortlist.push(car);
                renderBids();
            }
        }

        function fireHaptic(color) {
            if(navigator.vibrate) navigator.vibrate(40);
            hapticEl.style.background = color;
            hapticEl.classList.remove('flash-active');
            void hapticEl.offsetWidth;
            hapticEl.classList.add('flash-active');
        }

        // Bids List
        function renderBids() {
            const badge = document.getElementById('bid-badge');
            if(shortlist.length > 0) { badge.textContent = shortlist.length; badge.classList.remove('hidden'); }
            else badge.classList.add('hidden');

            const ctr = document.getElementById('bid-list-ctr');
            document.getElementById('empty-state').style.display = shortlist.length ? 'none' : 'block';
            ctr.querySelectorAll('.list-row').forEach(e => e.remove());

            shortlist.forEach(car => {
                const row = document.createElement('div');
                row.className = 'list-row';
                row.innerHTML = `
                    <div class="list-row-bg">
                        <div class="list-enter"><i class="fas fa-gavel mr-2"></i> ENTER</div>
                        <div class="list-remove">REMOVE <i class="fas fa-trash ml-2"></i></div>
                    </div>
                    <div class="list-row-fg">
                        <img class="list-row-img" src="${car.img}">
                        <div class="flex-1 min-w-0 flex flex-col justify-center">
                            <div class="font-bold text-lg truncate">${car.title}</div>
                            <div class="text-xs text-danger font-bold my-1"><i class="fas fa-fire"></i> LIVE NOW</div>
                            <div class="text-success font-mono font-bold">$${car.price.toLocaleString()}</div>
                        </div>
                        <div class="text-slate-600"><i class="fas fa-chevron-right"></i></div>
                    </div>
                `;
                ctr.appendChild(row);
                attachListSwipe(row.querySelector('.list-row-fg'), car);
            });
        }

        function attachListSwipe(el, car) {
            let startX, currentX = 0;
            const bg = el.previousElementSibling;
            const enter = bg.querySelector('.list-enter');
            const rem = bg.querySelector('.list-remove');

            const st = (e) => { el.style.transition = 'none'; startX = e.touches[0].clientX; };
            const mv = (e) => {
                if(startX === undefined) return;
                currentX = e.touches[0].clientX - startX;
                if(currentX > 0) {
                    enter.style.display = 'block'; rem.style.display = 'none';
                    bg.style.background = 'rgba(16, 185, 129, 0.2)';
                } else {
                    enter.style.display = 'none'; rem.style.display = 'block';
                    bg.style.background = 'rgba(244, 63, 94, 0.2)';
                }
                el.style.transform = `translateX(${currentX}px)`;
            };
            const en = () => {
                if(startX === undefined) return;
                el.style.transition = 'transform 0.3s ease';
                if(currentX > 80) {
                    el.style.transform = `translateX(${window.innerWidth}px)`;
                    setTimeout(() => openAuction(car), 300);
                } else if(currentX < -80) {
                    el.style.transform = `translateX(-${window.innerWidth}px)`;
                    setTimeout(() => {
                        shortlist = shortlist.filter(c => c.id !== car.id);
                        fireHaptic('#f43f5e');
                        renderBids();
                    }, 300);
                } else {
                    el.style.transform = 'translateX(0)';
                    bg.style.background = 'transparent';
                }
                startX = undefined; currentX = 0;
            };

            el.addEventListener('touchstart', st, {passive:true});
            el.addEventListener('touchmove', mv, {passive:true});
            el.addEventListener('touchend', en);
        }

        // Nav
        function navTo(tab) {
            document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`screen-${tab}`).classList.add('active');
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
            
            const titles = { home: 'DISCOVER', bids: 'MY BIDS', wishlist: 'WISHLIST', profile: 'PROFILE' };
            document.getElementById('global-title').textContent = titles[tab] || 'SWIPEBID';
        }

        // Auction
        let aucInterval, aucBid = 0, activeCar = null, placedBid = false;

        function openAuction(car) {
            activeCar = car; aucBid = car.price;
            document.getElementById('auc-img').src = car.img;
            document.getElementById('auc-title').textContent = car.title;
            updateAucPrice();
            
            document.getElementById('auc-feed').innerHTML = '';
            document.getElementById('nav-bar').style.transform = 'translateY(150%)';
            document.getElementById('screen-auction').classList.add('active');
            
            attachBidSwipe();
            runFakeAuction();
        }

        function closeAuction() {
            clearInterval(aucInterval); activeCar = null;
            document.getElementById('screen-auction').classList.remove('active');
            document.getElementById('nav-bar').style.transform = 'translateY(0)';
            document.getElementById('swipe-bid-btn').style.transform = 'none';
        }

        function updateAucPrice() {
            document.getElementById('auc-price').textContent = aucBid.toLocaleString();
        }

        function feedMsg(name, amt, me=false) {
            const f = document.getElementById('auc-feed');
            const item = document.createElement('div');
            item.className = `feed-item ${me ? 'me' : ''}`;
            item.innerHTML = `<span><i class="${me ? 'fas fa-user-circle' : 'fas fa-gavel'} mr-2"></i> ${name}</span><span class="font-mono">$${amt.toLocaleString()}</span>`;
            f.appendChild(item);
            if(f.children.length > 4) f.firstChild.remove();
        }

        function runFakeAuction() {
            const bots = ['TX_Dealer', 'CA_Motors', 'NY_Buyer', 'FL_Auto'];
            let ticks = 30;
            document.getElementById('auc-watchers').textContent = Math.floor(Math.random()*20 + 30);
            feedMsg('Starting Bid', aucBid);
            
            aucInterval = setInterval(() => {
                if(Math.random() > 0.6) {
                    aucBid += 100; updateAucPrice();
                    feedMsg(bots[Math.floor(Math.random()*bots.length)], aucBid);
                    document.getElementById('bid-area').style.borderColor = '#f43f5e';
                    setTimeout(()=>document.getElementById('bid-area').style.borderColor = 'rgba(255,255,255,0.1)', 200);
                    if(navigator.vibrate) navigator.vibrate(20);
                    ticks = 10;
                }
                ticks--;
                const tEl = document.getElementById('auc-timer');
                if(ticks > 5) tEl.innerHTML = `<i class="fas fa-circle text-[8px] animate-pulse rounded-full text-success"></i> LIVE Bidding`;
                else if(ticks > 0) tEl.innerHTML = `<i class="fas fa-stopwatch animate-bounce"></i> Going Once... ${ticks}s`;
                else { tEl.textContent = "SOLD!"; clearInterval(aucInterval); setTimeout(closeAuction, 2000); }
            }, 1000);
        }

        function attachBidSwipe() {
            const btn = document.getElementById('swipe-bid-btn');
            const area = document.getElementById('bid-area');
            const hint = document.getElementById('cancel-hint');
            let startY, currentY = 0, dragging = false;

            // Area cancel logic
            area.ontouchstart = e => { if(placedBid) startY = e.touches[0].clientY; };
            area.ontouchmove = e => {
                if(!placedBid || startY === undefined) return;
                if(e.touches[0].clientY - startY > 40) {
                    placedBid = false; hint.style.opacity = 0;
                    btn.style.transform = 'translateY(0) scale(1)';
                    btn.style.background = 'linear-gradient(135deg, #2563eb, #1d4ed8)';
                    aucBid -= 100; updateAucPrice();
                    fireHaptic('#f43f5e');
                    const feed = document.getElementById('auc-feed');
                    if(feed.lastChild && feed.lastChild.classList.contains('me')) feed.lastChild.remove();
                }
            };

            // Button drag logic
            const st = e => { if(placedBid) return; dragging = true; btn.style.transition='none'; startY = e.touches[0].clientY; };
            const mv = e => {
                if(!dragging) return;
                currentY = e.touches[0].clientY - startY;
                if(currentY < 0) {
                    btn.style.transform = `translateY(${currentY}px)`;
                    const p = Math.min(Math.abs(currentY)/80, 1);
                    btn.style.boxShadow = `0 ${10+p*20}px ${30+p*30}px rgba(16, 185, 129, ${0.4+p*0.4})`;
                }
            };
            const en = () => {
                if(!dragging) return; dragging = false;
                btn.style.transition = 'all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1.2)';
                if(currentY < -60) {
                    fireHaptic('#10b981'); if(navigator.vibrate) navigator.vibrate([40,40,40]);
                    aucBid += 100; updateAucPrice(); feedMsg('YOU', aucBid, true);
                    btn.style.transform = 'translateY(-30px) scale(0.9)';
                    btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
                    placedBid = true; hint.style.opacity = 1;
                    
                    setTimeout(() => {
                        if(placedBid) {
                            placedBid = false; hint.style.opacity = 0;
                            btn.style.transform = 'translateY(0) scale(1)';
                            btn.style.background = 'linear-gradient(135deg, #2563eb, #1d4ed8)';
                        }
                    }, 3500);
                } else {
                    btn.style.transform = 'translateY(0)';
                    btn.style.boxShadow = '0 10px 30px rgba(37, 99, 235, 0.4)';
                }
                currentY = 0;
            };

            btn.addEventListener('touchstart', st, {passive:true});
            window.addEventListener('touchmove', mv, {passive:true});
            window.addEventListener('touchend', en);
        }

        initDeck();
    </script>
</body>
</html>
