  document.getElementById('pg-emi').innerHTML='<div class="ph"><h2>EMI Tracking</h2><button class="btn bp" onclick="openAddEMI()">+ Add New Case</button></div><div class="pills"><div class="pill">Total Cases: <b>'+L.length+'</b></div><div class="pill">Active Defaults: <b>'+L.filter(function(l){return l.me>0&&l.ls!=='Closed';}).length+'</b></div><div class="pill">Critical (5+ EMIs): <b>'+L.filter(function(l){return l.me>=5;}).length+'</b></div></div><div style="margin-bottom:14px"><input class="si" id="esi" placeholder="Search by vehicle no. or borrower\u2026" oninput="fEMI()"></div><div class="card"><div class="twrap"><table><thead><tr><th>Case ID</th><th>Vehicle No.</th><th>Borrower</th><th>Vehicle</th><th>Missed EMIs</th><th>Outstanding (\u20B9)</th><th>Legal Status</th><th>Last Action</th><th>Status</th><th>Actions</th></tr></thead><tbody id="etb"></tbody></table></div></div>';
  drawEMI(L);
}
function drawEMI(data){
  const tb=document.getElementById('etb');if(!tb)return;
  if(!data.length){tb.innerHTML='<tr><td colspan="10" style="text-align:center;padding:30px;color:#888">No records found</td></tr>';return;}
  tb.innerHTML=data.map(function(l){
    const v=gv(l.vi);const ec=l.me>=5?'br':l.me>=3?'ba':'bg';
    const lc={'Notice Sent':'ba','Court Case Filed':'br','Closed':'bgr','Clean':'bg'}[l.ls]||'bgr';
    return '<tr><td>'+l.id+'</td><td><b>'+(v.n||'—')+'</b></td><td>'+l.br+'</td><td>'+v.mk+' '+v.mo+' ('+v.yr+')</td><td><span class="badge '+ec+'">'+l.me+'</span></td><td>'+fmt(l.os)+'</td><td><span class="badge '+lc+'">'+l.ls+'</span></td><td style="color:#888;font-size:12px">01-Mar-2026</td><td>'+bb(v.st)+'</td><td style="display:flex;gap:4px;flex-wrap:wrap"><button class="btn bsm bs" onclick="vwLoan(\''+l.id+'\')">View</button>'+(l.me>=2?'<button class="btn bsm bp" onclick="nav(\'repodec\')">Repo Eval</button>':'')+'</td></tr>';
  }).join('');
}
function fEMI(){const q=document.getElementById('esi').value.toLowerCase();drawEMI(L.filter(function(l){const v=gv(l.vi);return(v.n||'').toLowerCase().includes(q)||l.br.toLowerCase().includes(q);}));}
function vwLoan(id){

}

  }).join('');

function calcERV(lid){
  const l=L.find(function(x){return x.id===lid;});const erv=Math.round(l.os*0.72);const rec=erv>=l.os*0.6;
  const el=document.getElementById('erv-'+lid);el.style.display='block';
  el.innerHTML='<div class="rres"><div style="font-size:12px;color:#888">Estimated Recovery Value (ERV)</div><div class="erbig">'+fmt(erv)+'</div><div class="rb '+(rec?'rby':'rbn')+'">'+(rec?'\u2705 RECOMMEND REPOSSESSION':'\u274C DO NOT RECOMMEND')+'</div><div style="font-size:13px;color:#666;margin-bottom:12px">ERV = '+((erv/l.os)*100).toFixed(0)+'% of outstanding</div><table style="width:100%;font-size:13px;border-collapse:collapse;margin-bottom:14px"><thead><tr><th style="background:#1F4E79;color:#fff;padding:8px;text-align:left">Component</th><th style="background:#1F4E79;color:#fff;padding:8px">Value</th><th style="background:#1F4E79;color:#fff;padding:8px">Factor</th></tr></thead><tbody><tr><td style="padding:8px">Historical Market Price</td><td style="padding:8px">'+fmt(Math.round(erv*0.5))+'</td><td style="padding:8px">Base</td></tr><tr style="background:#f8f8f8"><td style="padding:8px">Condition Adjustment</td><td style="padding:8px">+10%</td><td style="padding:8px">Fair grade</td></tr><tr><td style="padding:8px">Location Factor</td><td style="padding:8px">+5%</td><td style="padding:8px">Urban</td></tr><tr style="background:#f8f8f8"><td style="padding:8px">Outstanding Buffer</td><td style="padding:8px">-15%</td><td style="padding:8px">Risk adj.</td></tr></tbody></table><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="btn bn" onclick="approveRepo(\''+lid+'\')">&#x2705; Approve &amp; Create Repo Order</button><button class="btn bd" onclick="rejectRepo(\''+lid+'\')">&#x274C; Override / Reject</button></div><div id="rej-'+lid+'" style="display:none;margin-top:10px"><textarea id="rejt-'+lid+'" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;font-size:13px" placeholder="Reason for rejection\u2026" rows="2"></textarea><button class="btn bd bsm" style="margin-top:6px" onclick="confirmRej(\''+lid+'\')">Confirm Rejection</button></div></div>';
}
function approveRepo(lid){RO.push({id:'RO00'+String(RO.length+1),vi:'V006',vn:'Swift Repo Pvt Ltd',ad:'2026-03-13',sd:7,st:'Assigned',pu:false});document.getElementById('rd-'+lid).innerHTML='<span class="badge bg">\u2713 Order Created</span>';document.getElementById('erv-'+lid).style.display='none';toast('Repo Order Created Successfully');}
function rejectRepo(lid){document.getElementById('rej-'+lid).style.display='block';}
function confirmRej(lid){document.getElementById('rej-'+lid).style.display='none';document.getElementById('erv-'+lid).style.display='none';document.getElementById('rd-'+lid).innerHTML='<span class="badge br">Rejected</span>';toast('Case marked as not recommended','wr');}

function buildAucCard(a){
  const v=gv(a.vi);const isAbove=a.cb>=a.rp;
  const plats=a.pl.split('+').map(function(p){return '<span class="ptag">'+p.trim()+'</span>';}).join('');
  const now=new Date('2026-03-13');const st=new Date(a.st+'T00:00:00');const et=new Date(a.et+'T00:00:00');
  const total=et-st;const elapsed=Math.max(0,now-st);const pct=Math.min(100,Math.round((elapsed/total)*100));
  const sc={'Active':'bg','Closed - Awaiting Payment':'ba','Closed':'bgr'}[a.status]||'bgr';
  return '<div class="ac"><div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px"><div><div style="font-weight:700;font-size:16px">'+v.n+' <span style="font-weight:400;color:#555;font-size:14px">'+v.mk+' '+v.mo+'</span></div><div style="margin-top:6px">'+plats+'</div></div><span class="badge '+sc+'">'+a.status+'</span></div><div class="as3"><div class="auction-stat"><div class="asl">Reserve Price</div><div class="asv">'+fmt(a.rp)+'</div></div><div class="auction-stat"><div class="asl">Current Bid</div><div class="asv" style="color:'+(isAbove?'#70AD47':'#FF4444')+'">'+fmt(a.cb)+'</div></div><div class="auction-stat"><div class="asl">Bid Count</div><div class="asv">'+a.bc+'</div></div></div><div style="font-size:12px;color:#888">'+fd(a.st)+' — '+fd(a.et)+'</div><div class="pb"><div class="pf" style="width:'+pct+'%;background:#2E75B6"></div></div><div style="font-size:12px;color:#888;margin-bottom:14px">'+pct+'% of auction duration elapsed</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn bp bsm" onclick="viewBids(\''+a.id+'\')">View Bids</button><button class="btn bs bsm" onclick="toast(\'Auction extended to '+fd(a.et)+'\')">Extend Auction</button>'+(a.status==='Active'?'<button class="btn bd bsm" onclick="closeAucConf(\''+a.id+'\')">Close Auction</button>':'')+'</div></div>';
}
function viewBids(aid){
  const a=AU.find(function(x){return x.id===aid;});const v=gv(a.vi);
  const bids=aid==='A001'?[{b:'Raj Motors',am:41000,t:'08-Mar 10:22',s:'Outbid'},{b:'City Autos',am:42500,t:'09-Mar 14:05',s:'Outbid'},{b:'Mumbai Auto Traders',am:43000,t:'10-Mar 09:30',s:'Outbid'},{b:'City Autos',am:44500,t:'11-Mar 11:15',s:'Outbid'},{b:'Raj Motors',am:46000,t:'12-Mar 16:40',s:'Outbid'},{b:'Mumbai Auto Traders',am:47500,t:'13-Mar 09:14',s:'Highest'}]:[{b:'Local Dealer',am:a.rp,t:fd(a.st),s:'Bid'}];
  sM('<h3>Bid History \u2014 '+a.id+' ('+v.n+')</h3><div class="twrap"><table><thead><tr><th>Bidder</th><th>Amount</th><th>Time</th><th>Status</th></tr></thead><tbody>'+bids.map(function(b){const bc=b.s==='Highest'?'bg':b.s==='Outbid'?'br':'bb';return '<tr><td>'+b.b+'</td><td><b>'+fmt(b.am)+'</b></td><td style="color:#888;font-size:13px">'+b.t+'</td><td><span class="badge '+bc+'">'+b.s+'</span></td></tr>';}).join('')+'</tbody></table></div>');
}
function closeAucConf(aid){
  sM('<h3>Close Auction</h3><p style="color:#555;margin-bottom:20px">Are you sure you want to close this auction? This action cannot be undone.</p><div style="display:flex;gap:10px"><button class="btn bs" onclick="cM()">Cancel</button><button class="btn bd" onclick="closeAuc(\''+aid+'\')">Confirm Close</button></div>');
}
function closeAuc(aid){const a=AU.find(function(x){return x.id===aid;});if(a)a.status='Closed';cM();rAuction();toast('Auction closed successfully','wr');}

  sM('<h3>Create Auction Listing</h3><div class="fg"><label>Vehicle (Inspected &amp; Approved)</label><select id="lv"><option value="V001">MH12AB1234 — Honda Activa (ERV: '+fmt(45000)+')</option><option value="V005">GJ05IJ7890 — Hero Splendor (ERV: '+fmt(28000)+')</option><option value="V008">MH01OP1234 — Mahindra Scorpio (ERV: '+fmt(820000)+')</option></select></div><div class="fg"><label>Reserve Price (\u20B9)</label><input id="lrp" type="number" placeholder="Auto-suggested: ERV \xd7 0.9"></div><div class="fr"><div class="fg"><label>Auction Start</label><input id="lst" type="date" value="2026-03-14"></div><div class="fg"><label>Auction End</label><input id="let" type="date" value="2026-03-21"></div></div><div class="fg"><label>Platform</label><div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:6px"><label style="display:flex;align-items:center;gap:6px"><input type="checkbox" checked> Internal</label><label style="display:flex;align-items:center;gap:6px"><input type="checkbox"> BidCar</label><label style="display:flex;align-items:center;gap:6px"><input type="checkbox"> CarDekho</label><label style="display:flex;align-items:center;gap:6px"><input type="checkbox"> OLX Autos</label></div></div><button class="btn bp" style="width:100%;margin-top:8px" onclick="submitList()">Create Listing</button>');
}

// ── S8: PAYMENTS ──────────────────────────────────────────────────────
function rPay(){
  document.getElementById('pg-payments').innerHTML='<div class="ph"><h2>Payment Collection</h2><button class="btn bp" onclick="openOfflinePay()">Record Offline Payment</button></div><div class="s3"><div class="sc"><div class="sv">'+fmt(26000)+'</div><div class="sl">Total Collected</div></div><div class="sc"><div class="sv" style="color:#FF8C00">'+fmt(47500)+'</div><div class="sl">Pending Collection</div></div><div class="sc"><div class="sv">'+fmt(0)+'</div><div class="sl">Overdue</div></div></div><div class="card"><div class="twrap"><table><thead><tr><th>Payment ID</th><th>Vehicle No.</th><th>Buyer</th><th>Amount Due (\u20B9)</th><th>Amount Paid (\u20B9)</th><th>Method</th><th>Status</th><th>Due Date</th><th>Actions</th></tr></thead><tbody>'+PAY.map(function(p){
    const v=gv(p.vi);const sc=p.st==='Paid'?'bg':'bb';
    let acts=p.st==='Paid'?'<button class="btn bsm bs" onclick="toast(\'Receipt generated\')">&#x1F9FE; Download Receipt</button>':'<button class="btn bsm bp" onclick="toast(\'Payment link sent to buyer\')">&#x1F4E4; Send Link</button> <button class="btn bsm bs" onclick="toast(\'Reminder SMS sent\')">&#x1F4AC; Reminder</button>';
    return '<tr><td><b>'+p.id+'</b></td><td>'+(v.n||'—')+'</td><td>'+p.buyer+'</td><td>'+fmt(p.ad)+'</td><td>'+fmt(p.ap)+'</td><td>'+(p.mt||'—')+'</td><td><span class="badge '+sc+'">'+p.st+'</span></td><td>'+fd(p.pd)+'</td><td style="display:flex;gap:4px;flex-wrap:wrap">'+acts+'</td></tr>';
  }).join('')+'</tbody></table></div></div>';
}
function openOfflinePay(){sM('<h3>Record Offline Payment</h3><div class="fr"><div class="fg"><label>Payment ID</label><input id="op1" placeholder="P003"></div><div class="fg"><label>Amount (\u20B9)</label><input id="op2" type="number"></div></div><div class="fg"><label>Payment Method</label><select id="op3"><option>Bank Transfer</option><option>Cheque</option><option>Cash</option></select></div><div class="fr"><div class="fg"><label>Reference Number</label><input id="op4" placeholder="UTR / Cheque No."></div><div class="fg"><label>Date</label><input id="op5" type="date" value="2026-03-13"></div></div><button class="btn bp" style="width:100%;margin-top:8px" onclick="cM();toast(\'Offline payment recorded\')">Record Payment</button>');}
// ── S9: VEHICLE RELEASE ───────────────────────────────────────────────
function rRelease(){
  document.getElementById('pg-release').innerHTML='<div class="ph"><h2>Vehicle Release &amp; Handover</h2></div><div class="card"><div class="twrap"><table><thead><tr><th>Release ID</th><th>Vehicle No.</th><th>Buyer</th><th>Sale Amount (\u20B9)</th><th>Payment</th><th>NOC Status</th><th>RC Transfer</th><th>Handover</th><th>Actions</th></tr></thead><tbody>'+REL.map(function(r){
    const v=gv(r.vi);
    let acts='';
    if(r.hv==='Not Started'&&r.id==='REL002'){acts='<button class="btn bsm bp" id="gro-btn" onclick="genRO(\''+r.id+'\')">Generate Release Order</button>';}
    else if(r.hv==='In Progress'&&r.id==='REL002'){acts='<button class="btn bsm bn" onclick="hvConf(\''+r.id+'\')">Mark Handed Over</button>';}
    else if(r.hv==='Complete'){acts='<button class="btn bsm bs" onclick="toast(\'Release documents downloaded\')">&#x1F4C4; Documents</button>';}
    return '<tr id="rel-'+r.id+'"><td><b>'+r.id+'</b></td><td>'+(v.n||'—')+'</td><td>'+r.buyer+'</td><td><b>'+fmt(r.am)+'</b></td><td>'+sbg(r.ps==='Paid'?'Complete':'Not Started')+'</td><td>'+sbg(r.ns)+'</td><td>'+sbg(r.rc)+'</td><td>'+sbg(r.hv)+'</td><td>'+acts+'</td></tr>';
  }).join('')+'</tbody></table></div></div>';
}
function genRO(rid){
  const r=REL.find(function(x){return x.id===rid;});if(r){r.ns='Complete';r.hv='In Progress';}
  rRelease();toast('Release Order Generated Successfully');
}
function hvConf(rid){
  sM('<h3>Confirm Handover</h3><p style="color:#555;margin-bottom:16px">Please confirm the handover details.</p><div class="fr"><div class="fg"><label>Operator Name</label><input id="hv1" placeholder="Your name"></div><div class="fg"><label>Handover Date</label><input id="hv2" type="date" value="2026-03-13"></div></div><button class="btn bn" style="width:100%;margin-top:8px" onclick="markHV(\''+rid+'\')">Confirm Handover</button>');
}
function markHV(rid){
  const r=REL.find(function(x){return x.id===rid;});if(r){r.rc='Complete';r.hv='Complete';}
  cM();rRelease();toast('Vehicle Handover Completed!');
}
