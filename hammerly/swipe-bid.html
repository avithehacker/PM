<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Hammerly — Swipe Bid</title>
  <meta name="description" content="Hammerly gesture-based bidding — swipe up to place your bid instantly." />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.18.0/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --sidebar-w:240px; --header-h:58px;
      --navy:#1F4E79; --navy-dark:#163a5c; --navy-light:#2563a8;
      --bg:#EEF2F7; --white:#ffffff; --text:#1e293b; --muted:#64748b; --border:#e2e8f0;
      --green:#16a34a; --green-bg:#dcfce7;
      --blue:#2563eb; --blue-bg:#dbeafe;
      --red:#dc2626; --red-bg:#fee2e2;
      --amber:#d97706; --amber-bg:#fef3c7;
      --grey:#6b7280; --grey-bg:#f3f4f6;
    }
    body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5 }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { overflow: hidden; }
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* Swipe track glow */
    .track-active { box-shadow: 0 0 0 3px rgba(31,78,121,0.22); }
    .track-success { box-shadow: 0 0 0 3px rgba(31,78,121,0.35); }

    /* Shimmer thumb */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }

    /* Pulse ring */
    @keyframes pulseRing {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(1.9); opacity: 0;   }
    }
    .pulse-ring { animation: pulseRing 2s ease-out infinite; }

    /* Checkmark */
    @keyframes drawCheck {
      from { stroke-dashoffset: 50; }
      to   { stroke-dashoffset: 0;  }
    }
    .check-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.4s ease-in-out 0.05s forwards;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }

    /* Ripple */
    @keyframes ripple {
      0%   { transform: scale(0); opacity: 0.5; }
      100% { transform: scale(5); opacity: 0; }
    }
    .ripple-anim { animation: ripple 0.65s ease-out forwards; }

    /* Float particles */
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-90px) scale(0.2); opacity: 0; }
    }
    .float-dot { animation: floatUp 1s ease-out forwards; }

    /* Dot Pulse */
    @keyframes dotPulse {
      0% { transform: scale(1); opacity: 0.8; }
      30% { transform: scale(1.6); opacity: 1; }
      100% { transform: scale(0); opacity: 0; }
    }
    .dot-success { animation: dotPulse 0.5s ease-out forwards; }

    /* Chip selected */
    .chip-selected {
      transform: scale(1.05);
      box-shadow: 0 0 0 2px var(--navy);
    }

    /* Toggle switch */
    .toggle-track { transition: background 0.22s ease; }
    .toggle-thumb { transition: transform 0.22s cubic-bezier(0.4,0,0.2,1); }

    /* Live dot */
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
    .live-dot { animation: livePulse 1.1s ease-in-out infinite; }

    /* Bottom panel shadow */
    .bid-panel { box-shadow: 0 -4px 24px rgba(31,78,121,0.10); }

    @keyframes slideInUp {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .slide-in { animation: slideInUp 0.22s ease-out forwards; }

    /* Spec row */
    .spec-row { border-bottom: 1px solid var(--border); padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
    .spec-row:last-child { border-bottom: none; }
    .spec-label { font-size: 11px; color: var(--muted); }
    .spec-value { font-size: 11px; font-weight: 600; color: var(--text); }

    /* Logo */
    .logo-icon { width:28px; height:28px; background:var(--navy); border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; letter-spacing:-0.5px; }
    .logo-text { font-weight:800; font-size:19px; color:var(--navy); letter-spacing:.5px; }

    /* Nav buttons */
    .nav-btn { background: none; border: none; cursor: pointer; color: var(--muted); display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; padding: 4px; font-family: inherit; }
    .nav-btn:hover { color: var(--navy); }
    .nav-action-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; font-family: inherit; }
    .nav-action-btn:hover { color: var(--navy); }

    /* Tap link */
    .tap-link { font-size: 11px; text-decoration: underline; text-underline-offset: 2px; color: var(--muted); background: none; border: none; cursor: pointer; margin-top: 4px; font-family: inherit; }
    .tap-link:hover { color: var(--navy); }
    .tap-link:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Toggle utility */
    .tabular-nums { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
  const { useState, useRef, useCallback, useEffect } = React;
  const { motion, AnimatePresence } = window.Motion;

  /* ── CONSTANTS ── */
  const TRACK_HEIGHT      = 220;
  const THUMB_SIZE        = 58;
  const MAX_DRAG          = TRACK_HEIGHT - THUMB_SIZE - 16;
  const SUCCESS_THRESHOLD = 0.65;
  const RESISTANCE        = 0.88;
  const API_DELAY         = 900;
  const FAIL_RATE         = 0.12;

  const BID_CHIPS = [1000, 2000, 3000];
  const BASE_CURRENT_BID = 64500;

  /* ── MOCK API ── */
  const mockPlaceBid = (amount) =>
    new Promise((res, rej) =>
      setTimeout(() =>
        Math.random() < FAIL_RATE ? rej(new Error('Connection timeout')) : res({ amount }),
        API_DELAY));

  const vibrate = (p) => { try { navigator.vibrate?.(p); } catch {} };

  /* ── MICROCOPY ── */
  const getMicrocopy = (state, progress, amt) => {
    if (state === 'loading') return 'Processing bid…';
    if (state === 'success') return 'Bid Placed Successfully!';
    if (state === 'error')   return 'Failed – Tap to retry';
    if (state === 'swiping') {
      if (progress >= SUCCESS_THRESHOLD) return 'Release to confirm';
      if (progress >= 0.35)              return 'Almost there…';
      return 'Keep swiping up…';
    }
    return `Swipe up to bid  +₹${amt.toLocaleString('en-IN')}`;
  };

  /* ══════════════════════════════════════
     BID TOAST
  ══════════════════════════════════════ */
  function BidToast({ toast }) {
    const isError = toast.isError;
    return (
      <motion.div
        layout
        initial={{ opacity: 0, y: 15, scale: 0.95 }}
        animate={{ opacity: 1, y: 0, scale: 1 }}
        exit={{ opacity: 0, scale: 0.9, transition: { duration: 0.15 } }}
        style={{
          borderRadius: 12, padding: '10px 16px',
          display: 'flex', alignItems: 'center', gap: 12,
          boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)',
          pointerEvents: 'auto',
          background: isError ? 'var(--red)' : 'var(--green)',
          color: '#fff',
        }}
      >
        <i className={`bi ${isError ? 'bi-exclamation-triangle-fill' : 'bi-check-circle-fill'}`} style={{fontSize:18}} />
        <div style={{flex:1}}>
          <p style={{fontSize:12, fontWeight:700, lineHeight:1.25, margin:0}}>
            {isError ? 'Bid Failed' : 'Bid Placed!'}
          </p>
          <p style={{fontSize:10, lineHeight:1.25, opacity:0.9, margin:0}}>
            {isError
              ? 'Connection error – please retry'
              : `₹${toast.amount.toLocaleString('en-IN')} · Highest bidder`}
          </p>
        </div>
      </motion.div>
    );
  }

  /* ══════════════════════════════════════
     COUNTDOWN
  ══════════════════════════════════════ */
  function Countdown() {
    const [s, setS] = useState(8 * 60 + 23);
    useEffect(() => {
      const id = setInterval(() => setS(v => Math.max(0, v - 1)), 1000);
      return () => clearInterval(id);
    }, []);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    return <span className="tabular-nums" style={{fontWeight:600, color:'var(--navy)'}}>{mm}:{ss}</span>;
  }

  /* ══════════════════════════════════════
     TOGGLE SWITCH
  ══════════════════════════════════════ */
  function ModeToggle({ mode, onChange }) {
    const isSwipe = mode === 'swipe';
    return (
      <div style={{display:'flex', alignItems:'center', gap:10}}>
        <span style={{fontSize:11, fontWeight:600, color: !isSwipe ? 'var(--navy)' : 'var(--muted)'}}>Tap</span>
        <button
          onClick={() => onChange(isSwipe ? 'tap' : 'swipe')}
          style={{
            position:'relative', display:'inline-flex', height:24, width:44,
            alignItems:'center', borderRadius:9999,
            background: isSwipe ? 'var(--navy)' : 'var(--border)',
            border: `1px solid ${isSwipe ? 'var(--navy)' : 'var(--border)'}`,
            cursor:'pointer',
          }}
          className="toggle-track"
          aria-label="Toggle bid mode"
          id="mode-toggle"
        >
          <span
            className="toggle-thumb"
            style={{
              display:'inline-block', height:16, width:16, borderRadius:9999,
              background:'#fff', boxShadow:'0 1px 2px rgba(0,0,0,0.15)',
              transform: isSwipe ? 'translateX(24px)' : 'translateX(4px)',
            }}
          />
        </button>
        <span style={{fontSize:11, fontWeight:600, color: isSwipe ? 'var(--navy)' : 'var(--muted)'}}>Swipe</span>
      </div>
    );
  }

  /* ══════════════════════════════════════
     PRICING CHIPS
  ══════════════════════════════════════ */
  function PricingChips({ selected, onSelect, disabled }) {
    return (
      <div style={{display:'flex', gap:8, justifyContent:'center'}}>
        {BID_CHIPS.map(amt => {
          const active = selected === amt;
          return (
            <button
              key={amt}
              onClick={() => !disabled && onSelect(amt)}
              id={`chip-${amt}`}
              className={active ? 'chip-selected' : ''}
              style={{
                padding: '8px 16px', borderRadius:8,
                fontSize:13, fontWeight:700,
                border: `1px solid ${active ? 'var(--navy)' : 'var(--border)'}`,
                background: active ? 'var(--navy)' : 'var(--white)',
                color: active ? '#fff' : 'var(--navy)',
                cursor: disabled ? 'not-allowed' : 'pointer',
                opacity: disabled ? 0.5 : 1,
                transition: 'all 0.15s',
                fontFamily: 'inherit',
              }}
            >
              +₹{(amt / 1000).toFixed(0)}K
            </button>
          );
        })}
      </div>
    );
  }

  /* ══════════════════════════════════════
     SWIPE TRACK
  ══════════════════════════════════════ */
  function SwipeTrack({ state, progress, bidAmt, onPointerDown, dots }) {
    const isSuccess = state === 'success';
    const isLoading = state === 'loading';
    const isError   = state === 'error';
    const atThresh  = progress >= SUCCESS_THRESHOLD;

    const microcopy = getMicrocopy(state, progress, bidAmt);
    const fillPct   = progress * 100;
    const thumbBot  = progress * MAX_DRAG;

    const trackBorder = isSuccess ? '2px solid #cbd5e1'
      : atThresh ? '2px solid var(--navy)'
      : '2px solid var(--border)';
    const trackBg = isSuccess ? '#f8fafc'
      : atThresh ? '#eff6ff'
      : '#f8fafc';
    const trackBoxShadow = isSuccess ? '0 0 0 3px rgba(31,78,121,0.22)'
      : atThresh ? '0 0 0 3px rgba(31,78,121,0.15)'
      : 'none';

    const thumbBg = isError ? 'var(--red)' : 'var(--navy)';

    const microColor = isSuccess ? 'var(--navy)'
      : isError ? 'var(--red)'
      : isLoading ? 'var(--muted)'
      : atThresh ? 'var(--blue)'
      : 'var(--muted)';

    return (
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:12, width:'100%', padding:'0 8px'}}>
        {/* Microcopy */}
        <div style={{height:16, display:'flex', alignItems:'flex-end', justifyContent:'center', width:'100%'}}>
          <AnimatePresence mode="wait">
            <motion.p
              key={microcopy}
              initial={{ opacity: 0, y: 3 }}
              animate={{ opacity: 1, y: 0 }}
              exit={{ opacity: 0, y: -3 }}
              transition={{ duration: 0.18 }}
              style={{fontSize:11, fontWeight:600, textAlign:'center', letterSpacing:'0.025em', color:microColor, margin:0}}
            >
              {microcopy}
            </motion.p>
          </AnimatePresence>
        </div>

        {/* Track */}
        <div
          id="swipe-track"
          style={{
            position:'relative', borderRadius:24, border:trackBorder,
            background:trackBg, overflow:'hidden', cursor:'pointer',
            userSelect:'none', transition:'all 0.3s', width:'100%',
            height:TRACK_HEIGHT, boxShadow:trackBoxShadow,
          }}
          onPointerDown={onPointerDown}
          onTouchStart={(e) => { e.preventDefault(); onPointerDown(e.touches[0]); }}
        >
          {/* Dotted Grid Background */}
          <div style={{position:'absolute', inset:0, padding:'16px 8px', display:'flex', flexDirection:'column', justifyContent:'space-between', pointerEvents:'none', zIndex:0}}>
            {Array.from({ length: 9 }).map((_, r) => {
              const size = 6;
              return (
                <div key={r} style={{display:'flex', justifyContent:'space-between', width:'100%', alignItems:'center', height:size}}>
                  {Array.from({ length: 11 }).map((_, c) => {
                    let scale = 1 + (progress * 1.5);
                    let opacity = 0.2 + (progress * 0.5);
                    let dotClass = 'grid-dot';
                    let delay = 0;
                    if (isSuccess) {
                      dotClass += ' dot-success';
                      delay = (r * 0.02) + (c * 0.01);
                    }
                    return (
                      <div
                        key={c}
                        className={dotClass}
                        style={{
                          width:size, height:size, borderRadius:'50%',
                          backgroundColor:'rgba(31,78,121,0.25)',
                          opacity:isSuccess ? 1 : opacity,
                          transform:`scale(${isSuccess ? 1 : scale})`,
                          animationDelay:isSuccess ? `${delay}s` : '0s'
                        }}
                      />
                    );
                  })}
                </div>
              );
            })}
          </div>

          {/* Fill bar overlay */}
          <div
            style={{
              position:'absolute', bottom:0, left:0, right:0,
              pointerEvents:'none', zIndex:0,
              height:`${fillPct}%`,
              background:'var(--navy)',
              opacity: 0.07 + progress * 0.12,
              borderRadius:24,
            }}
          />

          {/* THUMB */}
          <motion.div
            id="swipe-thumb"
            style={{position:'absolute', left:8, right:8, zIndex:10, bottom:thumbBot + 8, height:THUMB_SIZE}}
            animate={isSuccess ? { scale: [1, 1.02, 1] } : {}}
            transition={{ duration: 0.35 }}
          >
            <div
              style={{
                position:'absolute', inset:0, borderRadius:12,
                display:'flex', alignItems:'center', justifyContent:'center',
                background:thumbBg, color:'#fff',
                boxShadow:isSuccess ? '0 4px 16px rgba(31,78,121,0.35)' : '0 4px 16px rgba(31,78,121,0.15)',
                border:'1px solid rgba(255,255,255,0.1)',
              }}
            >
              {isSuccess ? (
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                  <path className="check-path" d="M6 14l5.5 5.5L22 9" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              ) : isError ? (
                <i className="bi bi-exclamation-circle-fill" style={{fontSize:22}} />
              ) : (
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <i className="bi bi-arrow-up" style={{fontSize:20}} />
                  <span style={{fontWeight:700, fontSize:15, letterSpacing:'0.025em'}}>Place the Bid</span>
                </div>
              )}
            </div>
          </motion.div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════
     TAP-TO-BID BUTTON
  ══════════════════════════════════════ */
  function TapBidButton({ state, bidAmt, onTap }) {
    const isLoading = state === 'loading';
    const isError   = state === 'error';
    const disabled  = isLoading;

    return (
      <motion.button
        id="tap-bid-btn"
        onClick={onTap}
        disabled={disabled}
        whileTap={!disabled ? { scale: 0.965 } : {}}
        style={{
          width:'100%', padding:'16px 0', borderRadius:12,
          fontSize:13, fontWeight:700, letterSpacing:'0.025em',
          border:'none', cursor:disabled ? 'not-allowed' : 'pointer',
          background:isError ? 'var(--red)' : isLoading ? 'rgba(31,78,121,0.6)' : 'var(--navy)',
          color:'#fff', position:'relative', overflow:'hidden',
          transition:'background 0.2s', fontFamily:'inherit',
        }}
      >
        {isLoading && (
          <span style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center'}}>
            <svg className="spinner" width="24" height="24" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.25)" strokeWidth="3"/>
              <path d="M12 3 A9 9 0 0 1 21 12" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/>
            </svg>
          </span>
        )}
        <span style={{opacity:isLoading ? 0 : 1}}>
          {isError ? 'Failed – Tap to Retry' : `Place Bid  ₹${bidAmt.toLocaleString('en-IN')}`}
        </span>
      </motion.button>
    );
  }

  /* ══════════════════════════════════════
     BIDDER CORE
  ══════════════════════════════════════ */
  function BidderCore({ bidIncrement, currentBid, mode, onBidSuccess, onBidError }) {
    const [state,    setState]    = useState('idle');
    const [progress, setProgress] = useState(0);
    const [dots,     setDots]     = useState([]);

    const dragging   = useRef(false);
    const startY     = useRef(0);
    const rawDrag    = useRef(0);
    const inFlight   = useRef(false);
    const resetTimer = useRef(null);

    const nextBidTotal = currentBid + bidIncrement;

    const resetToIdle = useCallback(() => {
      setState('idle');
      setProgress(0);
      setDots([]);
      inFlight.current = false;
    }, []);

    const executeBid = useCallback((amount) => {
      if (inFlight.current) return;
      inFlight.current = true;
      vibrate([25]);
      onBidSuccess(amount);
      resetToIdle();
      mockPlaceBid(amount).catch(() => {
        vibrate([100]);
        onBidError();
      });
    }, [onBidSuccess, onBidError, resetToIdle]);

    useEffect(() => {}, []);

    const onPointerMove = useCallback((e) => {
      if (!dragging.current) return;
      e.preventDefault();
      const cy = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
      const raw = Math.max(0, Math.min(startY.current - cy, MAX_DRAG / RESISTANCE));
      const resisted = raw * RESISTANCE;
      rawDrag.current = resisted;
      const p = Math.min(resisted / MAX_DRAG, 1);
      setProgress(prev => {
        if (p >= SUCCESS_THRESHOLD && prev < SUCCESS_THRESHOLD) vibrate(35);
        return p;
      });
    }, []);

    const onPointerUp = useCallback(() => {
      if (!dragging.current) return;
      dragging.current = false;
      window.removeEventListener('pointermove', onPointerMove);
      window.removeEventListener('pointerup',   onPointerUp);
      window.removeEventListener('touchmove',   onPointerMove);
      window.removeEventListener('touchend',    onPointerUp);
      const p = rawDrag.current / MAX_DRAG;
      if (p >= SUCCESS_THRESHOLD) {
        executeBid(nextBidTotal);
      } else {
        setProgress(0);
        setState('idle');
      }
    }, [onPointerMove, executeBid, nextBidTotal]);

    const onPointerDown = useCallback((e) => {
      if (e.preventDefault) e.preventDefault();
      dragging.current  = true;
      startY.current    = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
      rawDrag.current   = 0;
      setState('swiping');
      window.addEventListener('pointermove', onPointerMove, { passive: false });
      window.addEventListener('pointerup',   onPointerUp);
      window.addEventListener('touchmove',   onPointerMove, { passive: false });
      window.addEventListener('touchend',    onPointerUp);
    }, [state, onPointerMove, onPointerUp]);

    useEffect(() => {
      resetToIdle();
    }, [mode]);

    const handleTap = useCallback(() => {
      executeBid(nextBidTotal);
    }, [executeBid, nextBidTotal]);

    return mode === 'swipe' ? (
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:8}}>
        <SwipeTrack
          state={state}
          progress={progress}
          bidAmt={bidIncrement}
          onPointerDown={onPointerDown}
          dots={dots}
        />
        <button
          onClick={handleTap}
          disabled={state !== 'idle' && state !== 'error'}
          className="tap-link"
        >
          {state === 'error' ? 'Tap to Retry' : 'Tap to Bid Instead'}
        </button>
      </div>
    ) : (
      <TapBidButton state={state} bidAmt={nextBidTotal} onTap={handleTap} />
    );
  }

  /* ══════════════════════════════════════
     SPEC ROW
  ══════════════════════════════════════ */
  const SpecRow = ({ label, value, highlight }) => (
    <div className="spec-row">
      <span className="spec-label">{label}</span>
      <span style={{fontSize:11, fontWeight:600, color: highlight ? 'var(--red)' : 'var(--text)'}}>{value}</span>
    </div>
  );

  /* ══════════════════════════════════════
     VEHICLE IMAGE BANNER
  ══════════════════════════════════════ */
  function VehicleBanner() {
    return (
      <div style={{position:'relative', overflow:'hidden', height:190, background:'#dde6f0'}}>
        <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center',
          background:'linear-gradient(135deg, #c8d8e8 0%, #dde6f0 50%, #c8d8e8 100%)'}}>
          <svg viewBox="0 0 340 130" width="310" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.7">
            <rect x="20" y="70" width="300" height="35" rx="6" fill="#a8c0d8"/>
            <path d="M60 70 Q80 35 130 28 L210 28 Q250 28 280 70Z" fill="#a8c0d8"/>
            <circle cx="85"  cy="108" r="22" fill="#dde6f0" stroke="#8baabf" strokeWidth="5"/>
            <circle cx="255" cy="108" r="22" fill="#dde6f0" stroke="#8baabf" strokeWidth="5"/>
            <circle cx="85"  cy="108" r="8"  fill="#a8c0d8"/>
            <circle cx="255" cy="108" r="8"  fill="#a8c0d8"/>
            <rect x="130" y="32" width="80" height="32" rx="4" fill="#dde6f0" opacity="0.7"/>
            <rect x="50"  y="55" width="50" height="18" rx="3" fill="#dde6f0" opacity="0.6"/>
            <rect x="240" y="55" width="50" height="18" rx="3" fill="#dde6f0" opacity="0.6"/>
          </svg>
        </div>
        <div style={{position:'absolute', inset:0, background:'linear-gradient(to top, rgba(238,242,247,0.3), transparent)'}} />

        {/* Badges */}
        <div style={{position:'absolute', top:12, left:12, display:'flex', gap:8}}>
          <span style={{background:'var(--red)', color:'#fff', fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:4}}>SALVAGE</span>
          <span style={{background:'rgba(0,0,0,0.5)', color:'#fff', fontSize:10, fontWeight:500, padding:'3px 8px', borderRadius:4, backdropFilter:'blur(4px)'}}>
            <i className="bi bi-camera-fill" style={{marginRight:3}} />38 Photos
          </span>
        </div>
        <div style={{position:'absolute', top:12, right:12, background:'rgba(0,0,0,0.5)', color:'#fff', fontSize:10, fontWeight:500, padding:'3px 8px', borderRadius:4, backdropFilter:'blur(4px)'}}>
          LOT #99940955
        </div>

        {/* Live indicator */}
        <div style={{position:'absolute', bottom:12, left:12, display:'flex', alignItems:'center', gap:6, background:'rgba(0,0,0,0.6)', padding:'6px 10px', borderRadius:9999, backdropFilter:'blur(4px)'}}>
          <span className="live-dot" style={{width:8, height:8, borderRadius:'50%', background:'#f87171', display:'inline-block'}} />
          <span style={{color:'#fff', fontSize:10, fontWeight:600}}>LIVE AUCTION</span>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════
     APP ROOT
  ══════════════════════════════════════ */
  function App() {
    const [currentBid,   setCurrentBid]   = useState(BASE_CURRENT_BID);
    const [bidIncrement, setBidIncrement] = useState(BID_CHIPS[0]);
    const [bidMode,      setBidMode]      = useState('swipe');
    const [bidCount,     setBidCount]     = useState(24);
    const [toasts,       setToasts]       = useState([]);

    const showToast = useCallback((amount, isError = false) => {
      const id = Date.now() + Math.random();
      setToasts(prev => {
        const newToast = { id, amount, isError };
        return [newToast, ...prev].slice(0, 2);
      });
      setTimeout(() => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, 2000);
    }, []);

    const handleBidSuccess = useCallback((newTotal) => {
      setCurrentBid(newTotal);
      setBidCount(c => c + 1);
      showToast(newTotal, false);
    }, [showToast]);

    const handleBidError = useCallback(() => {
      showToast(0, true);
    }, [showToast]);

    return (
      <div style={{position:'relative', display:'flex', flexDirection:'column', height:'100%', background:'var(--bg)', overflow:'hidden', maxWidth:390, margin:'0 auto'}}>

        {/* TOP NAV */}
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', background:'var(--white)', borderBottom:'1px solid var(--border)', padding:'10px 16px', flexShrink:0}}>
          <button className="nav-btn" onClick={() => { window.location.href = 'index.html'; }}>
            <i className="bi bi-chevron-left" style={{fontSize:16}} /> Back
          </button>
          <div style={{display:'flex', alignItems:'center', gap:8}}>
            <span className="logo-icon">H</span>
            <span className="logo-text">Hammer<span>ly</span></span>
          </div>
          <div style={{display:'flex', gap:12}}>
            <button className="nav-action-btn"><i className="bi bi-heart" style={{fontSize:18}} /></button>
            <button className="nav-action-btn"><i className="bi bi-share" style={{fontSize:18}} /></button>
          </div>
        </div>

        {/* VEHICLE IMAGE */}
        <VehicleBanner />

        {/* SCROLLABLE CONTENT */}
        <div style={{flex:1, overflowY:'auto'}}>
          {/* Vehicle Title */}
          <div style={{background:'var(--white)', padding:'12px 16px', borderBottom:'1px solid var(--border)'}}>
            <h1 style={{fontSize:14, fontWeight:700, color:'var(--text)', margin:0, lineHeight:1.375}}>2022 Hyundai Creta SX</h1>
            <p style={{fontSize:11, color:'var(--muted)', marginTop:2, marginBottom:0}}>CT – Hartford · VIN: KNDJ23AU9M7134891</p>
          </div>

          {/* Bid info strip */}
          <div style={{borderBottom:'1px solid var(--border)', padding:'12px 16px', display:'flex', justifyContent:'space-between', alignItems:'center', background:'var(--bg)'}}>
            <div>
              <p style={{fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em', fontWeight:500, margin:0}}>Current Bid</p>
              <p style={{fontSize:22, fontWeight:900, color:'var(--navy)', margin:'2px 0 0'}}>₹{currentBid.toLocaleString('en-IN')}</p>
              <p style={{fontSize:10, color:'var(--muted)', marginTop:2, marginBottom:0}}>{bidCount} bids · You haven't bid</p>
            </div>
            <div style={{textAlign:'right'}}>
              <p style={{fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em', fontWeight:500, margin:0}}>Ends in</p>
              <Countdown />
              <p style={{fontSize:10, color:'var(--muted)', marginTop:2, marginBottom:0}}>Est. Retail: ₹9,20,000</p>
            </div>
          </div>

          {/* Spec table */}
          <div style={{background:'var(--white)', margin:'10px 12px', borderRadius:12, border:'1px solid var(--border)', padding:'4px 16px'}}>
            <SpecRow label="Odometer"     value="38,450 km" />
            <SpecRow label="Title Code"   value="Repossessed" highlight />
            <SpecRow label="Primary Dmg"  value="Minor Dents" />
            <SpecRow label="Engine"       value="1.5L 4-Cylinder" />
            <SpecRow label="Drive"        value="FWD" />
            <SpecRow label="Color"        value="Typhoon Silver" />
            <SpecRow label="Keys"         value="Present" />
          </div>
        </div>

        {/* FIXED BID PANEL */}
        <div className="bid-panel" style={{position:'relative', background:'var(--white)', borderTop:'1px solid var(--border)', padding:'12px 16px 20px', flexShrink:0, zIndex:10}}>

          {/* TOAST CONTAINER */}
          <div style={{position:'absolute', bottom:'100%', left:12, right:12, marginBottom:12, display:'flex', flexDirection:'column-reverse', gap:8, pointerEvents:'none', zIndex:50}}>
            <AnimatePresence mode="popLayout">
              {toasts.map(t => <BidToast key={t.id} toast={t} />)}
            </AnimatePresence>
          </div>

          {/* Row 1: increment label + toggle */}
          <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12}}>
            <div>
              <p style={{fontSize:10, color:'var(--muted)', textTransform:'uppercase', letterSpacing:'0.05em', fontWeight:600, margin:0}}>Bid Increment</p>
              <p style={{fontSize:13, fontWeight:700, color:'var(--text)', margin:0}}>+₹{bidIncrement.toLocaleString('en-IN')}</p>
            </div>
            <ModeToggle mode={bidMode} onChange={setBidMode} />
          </div>

          {/* Row 2: Pricing chips */}
          <PricingChips
            selected={bidIncrement}
            onSelect={setBidIncrement}
            disabled={false}
          />

          <div style={{marginTop:12}}>
            <p style={{textAlign:'center', fontSize:11, color:'var(--muted)', marginBottom:10}}>
              Your bid: <span style={{fontWeight:700, color:'var(--text)'}}>
                ₹{(currentBid + bidIncrement).toLocaleString('en-IN')}
              </span>
              <span style={{margin:'0 6px', color:'var(--border)'}}>·</span>
              Buyer's fee est. <span style={{fontWeight:600}}>₹3,200</span>
            </p>

            <BidderCore
              key={bidMode}
              bidIncrement={bidIncrement}
              currentBid={currentBid}
              mode={bidMode}
              onBidSuccess={handleBidSuccess}
              onBidError={handleBidError}
            />
          </div>

          <p style={{textAlign:'center', fontSize:10, color:'var(--muted)', marginTop:10, lineHeight:1.625}}>
            By bidding you agree to the <span style={{textDecoration:'underline', color:'var(--navy)', cursor:'pointer'}}>Terms of Use</span>.
            All sales are final.
          </p>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(
    <React.StrictMode><App /></React.StrictMode>
  );
</script>
</body>
</html>
