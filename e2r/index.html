<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-w:240px;
  --header-h:58px;
  --navy:#1F4E79;
  --navy-dark:#163a5c;
  --navy-light:#2563a8;
  --bg:#EEF2F7;
  --white:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --border:#e2e8f0;
  --green:#16a34a;--green-bg:#dcfce7;
  --blue:#2563eb;--blue-bg:#dbeafe;
  --red:#dc2626;--red-bg:#fee2e2;
  --amber:#d97706;--amber-bg:#fef3c7;
  --grey:#6b7280;--grey-bg:#f3f4f6;
  --bidkaro:#1a56db;
  --ediig:#0f766e;
  --cartrade:#c2410c;
  --cardekho:#b91c1c;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{text-decoration:none;color:inherit}

/* ── SIDEBAR ── */
#sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--navy);display:flex;flex-direction:column;z-index:200;overflow-y:auto}
.sb-logo{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-logo-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:.3px}
.sb-logo-sub{color:rgba(255,255,255,.55);font-size:10.5px;margin-top:2px}
.sb-nav{padding:10px 0;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.75);cursor:pointer;transition:.15s;border-left:3px solid transparent;font-size:13.5px}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:#60a5fa;font-weight:600}
.sb-item i{font-size:16px;flex-shrink:0}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:11px}

/* ── HEADER ── */
#header{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--header-h);background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1);display:flex;align-items:center;padding:0 24px;z-index:100;gap:16px}
#header-title{font-size:15px;font-weight:600;color:var(--navy);flex:1}
#header-sub{font-size:12px;color:var(--muted);flex:1}
.header-badge{background:var(--blue-bg);color:var(--blue);padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}

/* ── MAIN ── */
#main{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:24px;min-height:calc(100vh - var(--header-h))}

/* ── PAGES ── */
.page{display:none}
.page.active{display:block}
.page-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}
.page-desc{color:var(--muted);font-size:13px;margin-bottom:20px}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:#white;background-color:#white;background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid var(--kpi-color,#94a3b8);display:flex;flex-direction:column;gap:4px}
.kpi-val{font-size:22px;font-weight:700;color:var(--text)}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi-sub{font-size:11.5px;color:var(--muted)}
.kpi-icon{font-size:22px;align-self:flex-end;opacity:.4;margin-top:-4px}

/* ── CARDS ── */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);padding:18px}
.card-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}

/* ── GRID ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--navy);color:#fff;position:sticky;top:0;z-index:10}
thead th{padding:10px 12px;text-align:left;font-weight:600;font-size:12px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:.1s}
tbody tr:hover{background:#f8fafc}
tbody td{padding:9px 12px;white-space:nowrap;vertical-align:middle}
.tbl-sm td,.tbl-sm th{padding:7px 10px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge-paid{background:var(--green-bg);color:var(--green)}
.badge-pending{background:var(--blue-bg);color:var(--blue)}
.badge-overdue{background:var(--red-bg);color:var(--red)}
.badge-partial{background:var(--amber-bg);color:var(--amber)}
.badge-grey{background:var(--grey-bg);color:var(--grey)}
.badge-platform{color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.bp-bidkaro{background:var(--bidkaro)} .bp-ediig{background:var(--ediig)} .bp-cartrade{background:var(--cartrade)} .bp-cardekho{background:var(--cardekho)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;text-align:center;justify-content:center}
.btn-primary{background:var(--navy);color:#fff} .btn-primary:hover{background:var(--navy-dark)}
.btn-success{background:var(--green);color:#fff} .btn-success:hover{background:#15803d}
.btn-danger{background:var(--red);color:#fff} .btn-danger:hover{background:#b91c1c}
.btn-outline{background:#fff;color:var(--navy);border:1px solid var(--navy)} .btn-outline:hover{background:var(--navy);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11.5px;gap:3px}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12.5px;font-weight:500;background:#fff;border:1px solid var(--border);color:var(--muted);transition:.15s}
.ftab.active,.ftab:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── SEARCH BAR ── */
.search-row{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-input{flex:1;min-width:180px;padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none}
.search-input:focus{border-color:var(--navy)}

/* ── ACTIVITY FEED ── */
.activity-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:center}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}

/* ── VEHICLE CARDS ── */
.vc-reg{font-family:monospace;font-size:12.5px;font-weight:700;color:var(--navy);background:rgba(31,78,121,0.08);padding:2px 6px;border-radius:4px;letter-spacing:.3px}
.progress-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:.3s}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:12px;width:min(560px,96vw);max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700;color:var(--navy)}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);line-height:1}
.modal-body{padding:20px 22px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:5px}
.form-control{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.form-control:focus{border-color:var(--navy)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;padding:4px 0}
.detail-item{} .detail-item .dl{font-size:11.5px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px;font-weight:500} .detail-item .dv{font-size:13px;font-weight:600;color:var(--text)}

/* ── TOAST ── */
#toast-container{position:fixed;top:70px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;animation:slideIn .25s ease;min-width:260px}
.toast-success{background:var(--green);color:#fff} .toast-error{background:var(--red);color:#fff} .toast-warning{background:var(--amber);color:#fff}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── CHART CONTAINERS ── */
.chart-wrap{position:relative;height:220px}

/* ── EST VAL BOX ── */
.rres{background:var(--grey-bg);padding:16px;border-radius:8px;margin-top:16px;animation:sd .3s}
@keyframes sd{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.erbig{font-size:28px;font-weight:700;color:var(--navy);margin:8px 0}
.rb{padding:10px 16px;border-radius:6px;font-size:13px;font-weight:700;margin:10px 0}
.rby{background:#E2EFDA;color:#375623} .rbn{background:#FFE0E0;color:#cc0000}

/* ── FOOTER ── */
.page-footer{margin-top:32px;padding-top:14px;border-top:1px solid var(--border);color:var(--muted);font-size:11.5px;text-align:center}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #sidebar{transform:translateX(-100%);transition:.25s}
  #sidebar.open{transform:translateX(0)}
  #header{left:0}
  #main{margin-left:0}
  .kpi-row{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  #mob-toggle{display:flex!important}
}
#mob-toggle{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--navy)}
</style>

// ── UTILS ─────────────────────────────────────────────────────────────
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(n){if(n===null||n===undefined||n==='')return '—';return '₹'+Number(n).toLocaleString('en-IN');}
function fd(d){if(!d)return '—';const dt=new Date(d+'T00:00:00');return String(dt.getDate()).padStart(2,'0')+'-'+MN[dt.getMonth()]+'-'+dt.getFullYear();}
function addD(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function dAgo(d){return Math.floor((new Date('2026-03-13')-new Date(d+'T00:00:00'))/86400000);}

}

function sbg(s){

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,type){
  type=type||'success';
  if(type==='wr') type='warning';
  const container = document.getElementById('toast-container');
  if(!container) return;
  const el = document.createElement('div');
  el.className = 'toast toast-'+type;
  
  let icon = 'bi-check-circle-fill';
  if(type==='error') icon = 'bi-x-circle-fill';
  if(type==='warning') icon = 'bi-exclamation-triangle-fill';
  
  el.innerHTML = `<i class="bi ${icon}"></i> <span>${msg}</span>`;
  container.appendChild(el);
  
  setTimeout(function(){
    el.style.opacity = '0';
    el.style.transform = 'translateX(60px)';
    el.style.transition = 'all 0.25s ease';
    setTimeout(function(){
      el.remove();
    }, 260);

  const total=et-st;const elapsed=Math.max(0,now-st);const pct=Math.min(100,Math.round((elapsed/total)*100));
  const sc={'Active':'badge-paid','Closed - Awaiting Payment':'badge-partial','Closed':'badge-grey'}[a.status]||'badge-grey';
  
  return `
    <div class="card" style="border-top:4px solid var(--navy)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>

        </div>
        <span class="badge ${sc}">${a.status}</span>
      </div>
      
      <div class="kpi-row" style="grid-template-columns: repeat(3, 1fr); margin-bottom:14px; gap:8px">
        <div style="background:var(--grey-bg);padding:10px;border-radius:6px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">Reserve Price</div>
          <div style="font-size:14px;font-weight:700;color:var(--text);margin-top:2px">${fmt(a.rp)}</div>
        </div>
        <div style="background:var(--grey-bg);padding:10px;border-radius:6px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">Current Bid</div>
          <div style="font-size:14px;font-weight:700;color:${isAbove?'var(--green)':'var(--red)'};margin-top:2px">${fmt(a.cb)}</div>
        </div>
        <div style="background:var(--grey-bg);padding:10px;border-radius:6px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">Bids Count</div>
          <div style="font-size:14px;font-weight:700;color:var(--text);margin-top:2px">${a.bc} bids</div>
        </div>
      </div>
      
      <div style="font-size:12px;color:var(--muted);display:flex;justify-content:space-between">
        <span>Start: ${fd(a.st)}</span>
        <span>End: ${fd(a.et)}</span>
      </div>
      <div class="progress-bar" style="margin:8px 0">
        <div class="progress-fill" style="width:${pct}%;background:var(--blue)"></div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;display:flex;justify-content:space-between">
        <span>Timeline Elapsed</span>
        <strong>${pct}% completed</strong>
      </div>
      
      <div style="display:flex;gap:6px;border-top:1px solid var(--border);padding-top:12px">
        <button class="btn btn-outline btn-xs" onclick="viewBids('${a.id}')"><i class="bi bi-clock-history"></i> Bids History</button>
        <button class="btn btn-outline btn-xs" onclick="toast('Listing duration extended for ${a.id}')"><i class="bi bi-calendar-plus"></i> Extend</button>
        ${a.status==='Active'?`<button class="btn btn-danger btn-xs" onclick="closeAucConf('${a.id}')"><i class="bi bi-stop-circle"></i> Close Now</button>`:''}
      </div>
    </div>
  `;
}

function viewBids(aid){
  const a=AU.find(function(x){return x.id===aid;});const v=gv(a.vi);
  const bids=aid==='A001'?[
    {b:'Raj Motors',am:41000,t:'08-Mar 10:22',s:'Outbid'},
    {b:'City Autos',am:42500,t:'09-Mar 14:05',s:'Outbid'},
    {b:'Mumbai Auto Traders',am:43000,t:'10-Mar 09:30',s:'Outbid'},
    {b:'City Autos',am:44500,t:'11-Mar 11:15',s:'Outbid'},
    {b:'Raj Motors',am:46000,t:'12-Mar 16:40',s:'Outbid'},
    {b:'Mumbai Auto Traders',am:47500,t:'13-Mar 09:14',s:'Highest'}
  ]:[
    {b:'Local Dealer',am:a.rp,t:fd(a.st),s:'Bid'}
  ];
  
  sM(`
    <h3>Bid History — ${a.id} (${v.n})</h3>
    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th>Bidder Group</th>
            <th>Proposed Bid Amount</th>
            <th>Log Timestamp</th>
            <th>Bidding Status</th>
          </tr>
        </thead>
        <tbody>
          ${bids.map(function(b){
            const bc=b.s==='Highest'?'badge-paid':b.s==='Outbid'?'badge-overdue':'badge-pending';
            return `
              <tr>
                <td><strong>${b.b}</strong></td>
                <td><strong>${fmt(b.am)}</strong></td>
                <td style="color:var(--muted);font-size:12.5px">${b.t}</td>
                <td><span class="badge ${bc}">${b.s}</span></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
  `);
}

function closeAucConf(aid){
  sM(`
    <h3>Terminate Active Auction Listing</h3>
    <p style="color:var(--text);font-size:13px;margin-bottom:20px">Are you absolutely sure you want to terminate this live asset auction listing? Bidding actions will be locked and outstanding high bids frozen.</p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="cM()">Cancel</button>
      <button class="btn btn-danger" onclick="closeAuc('${aid}')">Confirm Termination</button>
    </div>
  `);
}

function closeAuc(aid){const a=AU.find(function(x){return x.id===aid;});if(a)a.status='Closed';cM();rAuction();toast('Asset auction terminated successfully','warning');}

// ── S8: PAYMENTS ──────────────────────────────────────────────────────
function rPay(){
  const totalColl = PAY.reduce((sum, p) => sum + p.ap, 0);
  const pendingColl = PAY.reduce((sum, p) => sum + (p.ad - p.ap), 0);
  
  document.getElementById('pg-payments').innerHTML = `
    <div class="ph" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div>
        <div class="page-title">Payment Collection</div>
        <div class="page-desc">Record buyer remittance payments, generate payment links, and audit overdue balances</div>
      </div>
      <button class="btn btn-primary" onclick="openOfflinePay()"><i class="bi bi-wallet2"></i> Record Offline Payment</button>
    </div>
    
    <div class="kpi-row">
      <div class="kpi-card" style="--kpi-color:var(--green)">
        <div class="kpi-icon"><i class="bi bi-check2-all"></i></div>
        <div class="kpi-val">${fmt(totalColl)}</div>
        <div class="kpi-label">Total Remitted</div>
        <div class="kpi-sub">Funds settled in bank</div>
      </div>
      <div class="kpi-card" style="--kpi-color:var(--amber)">
        <div class="kpi-icon"><i class="bi bi-hourglass"></i></div>
        <div class="kpi-val">${fmt(pendingColl)}</div>
        <div class="kpi-label">Outstanding Collection</div>
        <div class="kpi-sub">Funds remaining in auction escrow</div>
      </div>
      <div class="kpi-card" style="--kpi-color:var(--red)">
        <div class="kpi-icon"><i class="bi bi-shield-slash"></i></div>
        <div class="kpi-val">${fmt(0)}</div>
        <div class="kpi-label">Overdue collections</div>
        <div class="kpi-sub">Past due balance total</div>
      </div>
    </div>
    
    <div class="card">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Payment ID</th>
              <th>Vehicle No.</th>
              <th>Winning Buyer</th>
              <th>Amount Due</th>
              <th>Amount Remitted</th>
              <th>Settlement Method</th>
              <th>Collection Status</th>
              <th>Settlement Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${PAY.map(function(p){
              const v=gv(p.vi);const sc=p.st==='Paid'?'badge-paid':'badge-pending';
              const isRem = p.st==='Paid';
              return `
                <tr>
                  <td><b>${p.id}</b></td>
                  <td><span class="vc-reg">${v.n||'—'}</span></td>
                  <td><strong>${p.buyer}</strong></td>
                  <td><strong>${fmt(p.ad)}</strong></td>
                  <td><strong style="color:var(--green)">${fmt(p.ap)}</strong></td>
                  <td><i class="bi bi-bank"></i> ${p.mt||'—'}</td>
                  <td><span class="badge ${sc}">${p.st}</span></td>
                  <td>${p.pd ? fd(p.pd) : '—'}</td>
                  <td>
                    <div style="display:flex;gap:4px">
                      ${isRem?`<button class="btn btn-outline btn-xs" onclick="toast('Receipt generated')"><i class="bi bi-file-earmark-pdf"></i> Receipt</button>`:`
                        <button class="btn btn-primary btn-xs" onclick="toast('Escrow remittance link dispatched')"><i class="bi bi-link-45deg"></i> Send Link</button>
                        <button class="btn btn-outline btn-xs" onclick="toast('Escrow overdue reminder triggered')"><i class="bi bi-chat-dots"></i> Remind</button>
                      `}
                    </div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="page-footer">Auctimeter 2.0 &copy; 2026 Avinash Singh</div>
  `;
}

// ── S9: VEHICLE RELEASE ───────────────────────────────────────────────
function rRelease(){
  document.getElementById('pg-release').innerHTML = `
    <div class="page-title">Vehicle Release &amp; Handover</div>
    <div class="page-desc">Audit loan closures, issue No-Objection Certificates (NOC), complete physical keys handover, and verify RTO Registration Certificate (RC) transfers</div>
    
    <div class="card" style="margin-top:14px">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Release ID</th>
              <th>Vehicle No.</th>
              <th>Authorized Buyer</th>
              <th>Final Hammer Price</th>
              <th>Escrow Payment</th>
              <th>NOC Certificate</th>
              <th>RC Transfer</th>
              <th>Physical Handover</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${REL.map(function(r){
              const v=gv(r.vi);
              let acts='';
              if(r.hv==='Not Started'&&r.id==='REL002'){
                acts='<button class="btn btn-primary btn-xs" id="gro-btn" onclick="genRO(\''+r.id+'\')"><i class="bi bi-file-earmark-richtext"></i> Issue Release Order</button>';
              }
              else if(r.hv==='In Progress'&&r.id==='REL002'){
                acts='<button class="btn btn-success btn-xs" onclick="hvConf(\''+r.id+'\')"><i class="bi bi-person-check"></i> Complete Handover</button>';
              }
              else if(r.hv==='Complete'){
                acts='<button class="btn btn-outline btn-xs" onclick="toast(\'Release dossier downloaded\')"><i class="bi bi-file-zip"></i> Download Dossier</button>';
              }
              return `
                <tr id="rel-${r.id}">
                  <td><b>${r.id}</b></td>
                  <td><span class="vc-reg">${v.n||'—'}</span></td>
                  <td><strong>${r.buyer}</strong></td>
                  <td><strong>${fmt(r.am)}</strong></td>
                  <td>${sbg(r.ps==='Paid'?'Complete':'Not Started')}</td>
                  <td>${sbg(r.ns)}</td>
                  <td>${sbg(r.rc)}</td>
                  <td>${sbg(r.hv)}</td>
                  <td>
                    <div id="ract-${r.id}">${acts}</div>
                  </td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="page-footer">Auctimeter 2.0 &copy; 2026 Avinash Singh</div>
  `;
}

function genRO(rid){
  const r=REL.find(function(x){return x.id===rid;});if(r){r.ns='Complete';r.hv='In Progress';}
  rRelease();toast('NOC Issued & Release Order Generated Successfully');
}

function hvConf(rid){
  sM(`
    <h3>Confirm Physical Seized Asset Handover</h3>
    <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Enter operator name and date to verify physical asset handover to winning bidder.</p>
    <div class="form-row">
      <div class="form-group">

        <input class="form-control" id="hv1" placeholder="Operator Full Name">
      </div>
      <div class="form-group">
        <label class="form-label">Actual Handover Date</label>
        <input class="form-control" id="hv2" type="date" value="2026-03-13">
      </div>
    </div>
    <button class="btn btn-success" style="width:100%;margin-top:8px" onclick="markHV('${rid}')">Confirm Handover Release</button>
  `);
}

function markHV(rid){
  const r=REL.find(function(x){return x.id===rid;});if(r){r.rc='Complete';r.hv='Complete';}
  cM();rRelease();toast('Vehicle Physical Handover Completed successfully!');
}
