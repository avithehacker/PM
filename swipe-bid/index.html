<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Auction Lot #99940955 – Bid Now</title>
  <meta name="description" content="Live auction bidding for 2021 KIA Soul LX – Copart-style mobile bid UI." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            copart: {
              navy:    '#0033A0',
              navydk:  '#00257A',
              blue:    '#1565C0',
              green:   '#1B7F3B',
              greenlt: '#22a34a',
              red:     '#C62828',
              gray:    '#F5F6F8',
              border:  '#DDE1E8',
              muted:   '#6B7280',
              text:    '#111827',
            }
          }
        }
      }
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.18.0/dist/framer-motion.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    html, body, #root { height: 100%; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #F5F6F8; overflow: hidden; }
    ::-webkit-scrollbar { width: 0; height: 0; }

    /* Swipe track glow */
    .track-active { box-shadow: 0 0 0 3px rgba(27,127,59,0.25); }
    .track-success { box-shadow: 0 0 0 3px rgba(27,127,59,0.45); }

    /* Shimmer thumb */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .shimmer-green {
      background: linear-gradient(90deg, #1B7F3B 20%, #34c963 50%, #1B7F3B 80%);
      background-size: 200% auto;
      animation: shimmer 2s linear infinite;
    }

    /* Pulse ring */
    @keyframes pulseRing {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(1.9); opacity: 0;   }
    }
    .pulse-ring { animation: pulseRing 2s ease-out infinite; }

    /* Checkmark */
    @keyframes drawCheck {
      from { stroke-dashoffset: 50; }
      to   { stroke-dashoffset: 0;  }
    }
    .check-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: drawCheck 0.4s ease-in-out 0.05s forwards;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.75s linear infinite; }

    /* Ripple */
    @keyframes ripple {
      0%   { transform: scale(0); opacity: 0.5; }
      100% { transform: scale(5); opacity: 0; }
    }
    .ripple-anim { animation: ripple 0.65s ease-out forwards; }

    /* Float particles */
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-90px) scale(0.2); opacity: 0; }
    }
    .float-dot { animation: floatUp 1s ease-out forwards; }

    /* Chip selected border anim */
    .chip-selected {
      transform: scale(1.05);
      box-shadow: 0 0 0 2px #1B7F3B;
    }

    /* Toggle switch */
    .toggle-track {
      transition: background 0.22s ease;
    }
    .toggle-thumb {
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    /* Live dot */
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
    .live-dot { animation: livePulse 1.1s ease-in-out infinite; }

    /* Bottom panel shadow */
    .bid-panel { box-shadow: 0 -4px 24px rgba(0,0,0,0.10); }

    @keyframes slideInUp {
      from { transform: translateY(8px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .slide-in { animation: slideInUp 0.22s ease-out forwards; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
  const { useState, useRef, useCallback, useEffect } = React;
  const { motion, AnimatePresence } = window.Motion;

  /* ── CONSTANTS ── */
  const TRACK_HEIGHT      = 220;   // shorter track = less distance to swipe
  const THUMB_SIZE        = 58;
  const MAX_DRAG          = TRACK_HEIGHT - THUMB_SIZE; // ~162px effective drag
  const SUCCESS_THRESHOLD = 0.65;  // trigger at 65% (was 80%) — snappier
  const RESISTANCE        = 0.88;  // near-linear movement (was 0.70) — feels direct
  const API_DELAY         = 900;   // faster mock API (was 1800ms)
  const FAIL_RATE         = 0.12;

  const BID_CHIPS = [1000, 2000, 3000]; // ₹ increment options
  const BASE_CURRENT_BID = 64500;       // starting current highest bid

  /* ── MOCK API ── */
  const mockPlaceBid = (amount) =>
    new Promise((res, rej) =>
      setTimeout(() =>
        Math.random() < FAIL_RATE ? rej(new Error('Connection timeout')) : res({ amount }),
        API_DELAY));

  const vibrate = (p) => { try { navigator.vibrate?.(p); } catch {} };

  /* ── MICROCOPY ── */
  const getMicrocopy = (state, progress, amt) => {
    if (state === 'loading') return 'Processing bid…';
    if (state === 'success') return 'Bid Placed Successfully!';
    if (state === 'error')   return 'Failed – Tap to retry';
    if (state === 'swiping') {
      if (progress >= SUCCESS_THRESHOLD) return 'Release to confirm';
      if (progress >= 0.35)              return 'Almost there…';
      return 'Keep swiping up…';
    }
    return `Swipe up to bid  +₹${amt.toLocaleString('en-IN')}`;
  };

  /* ══════════════════════════════════════
     ICONS
  ══════════════════════════════════════ */
  const IconChevronLeft = () => (
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M11 4l-5 5 5 5" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
  const IconShare = () => (
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M13 6l-4-4-4 4M9 2v9M4 13h10a1 1 0 001-1V9" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
  const IconHeart = () => (
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M9 15s-6-4.5-6-8.5A4 4 0 019 3.7 4 4 0 0115 6.5c0 4-6 8.5-6 8.5z" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
  const IconArrowUp = () => (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M11 17V5M11 5l-5 5M11 5l5 5" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
  const IconCheck = () => (
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path className="check-path" d="M6 14l5.5 5.5L22 9" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
  const IconSpinner = () => (
    <svg className="spinner" width="24" height="24" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke="rgba(255,255,255,0.25)" strokeWidth="3"/>
      <path d="M12 3 A9 9 0 0 1 21 12" stroke="white" strokeWidth="3" strokeLinecap="round"/>
    </svg>
  );
  const IconAlert = () => (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M11 7v5M11 15h.01" stroke="white" strokeWidth="2.2" strokeLinecap="round"/>
    </svg>
  );

  /* ══════════════════════════════════════
     BID TOAST  – animated list item
  ══════════════════════════════════════ */
  function BidToast({ toast }) {
    const isError = toast.isError;
    return (
      <motion.div
        layout
        initial={{ opacity: 0, y: 15, scale: 0.95 }}
        animate={{ opacity: 1, y: 0, scale: 1 }}
        exit={{ opacity: 0, scale: 0.9, transition: { duration: 0.15 } }}
        className={`rounded-xl px-4 py-2.5 flex items-center gap-3 shadow-lg pointer-events-auto
          ${isError ? 'bg-red-600' : 'bg-copart-green'}`}
      >
        <span className="text-lg">{isError ? '⚠️' : '✅'}</span>
        <div className="flex-1">
          <p className="text-white text-xs font-bold leading-tight">
            {isError ? 'Bid Failed' : 'Bid Placed!'}
          </p>
          <p className="text-white/90 text-[10px] leading-tight">
            {isError
              ? 'Connection error – please retry'
              : `₹${toast.amount.toLocaleString('en-IN')} · Highest bidder`}
          </p>
        </div>
      </motion.div>
    );
  }

  /* ══════════════════════════════════════
     COUNTDOWN
  ══════════════════════════════════════ */
  function Countdown() {
    const [s, setS] = useState(8 * 60 + 23);
    useEffect(() => {
      const id = setInterval(() => setS(v => Math.max(0, v - 1)), 1000);
      return () => clearInterval(id);
    }, []);
    const mm = String(Math.floor(s / 60)).padStart(2, '0');
    const ss = String(s % 60).padStart(2, '0');
    return <span className="tabular-nums font-semibold text-copart-red">{mm}:{ss}</span>;
  }

  /* ══════════════════════════════════════
     TOGGLE SWITCH  (Swipe ↔ Tap mode)
  ══════════════════════════════════════ */
  function ModeToggle({ mode, onChange }) {
    const isSwipe = mode === 'swipe';
    return (
      <div className="flex items-center gap-2.5">
        <span className={`text-xs font-semibold ${!isSwipe ? 'text-copart-navy' : 'text-copart-muted'}`}>Tap</span>
        <button
          onClick={() => onChange(isSwipe ? 'tap' : 'swipe')}
          className={`relative inline-flex h-6 w-11 items-center rounded-full toggle-track border ${isSwipe ? 'bg-copart-navy border-copart-navy' : 'bg-copart-border border-copart-border'}`}
          aria-label="Toggle bid mode"
          id="mode-toggle"
        >
          <span
            className={`inline-block h-4 w-4 rounded-full bg-white shadow-sm toggle-thumb ${isSwipe ? 'translate-x-6' : 'translate-x-1'}`}
          />
        </button>
        <span className={`text-xs font-semibold ${isSwipe ? 'text-copart-navy' : 'text-copart-muted'}`}>Swipe</span>
      </div>
    );
  }

  /* ══════════════════════════════════════
     PRICING CHIPS
  ══════════════════════════════════════ */
  function PricingChips({ selected, onSelect, disabled }) {
    return (
      <div className="flex gap-2 justify-center">
        {BID_CHIPS.map(amt => {
          const active = selected === amt;
          return (
            <button
              key={amt}
              onClick={() => !disabled && onSelect(amt)}
              id={`chip-${amt}`}
              className={[
                'px-4 py-2 rounded-lg text-sm font-bold border transition-all duration-150',
                active
                  ? 'bg-copart-navy text-white border-copart-navy chip-selected'
                  : 'bg-white text-copart-navy border-copart-border hover:border-copart-navy',
                disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer active:scale-95',
              ].join(' ')}
            >
              +₹{(amt / 1000).toFixed(0)}K
            </button>
          );
        })}
      </div>
    );
  }

  /* ══════════════════════════════════════
     SWIPE TRACK
     loading state removed — thumb only shows: idle → swiping → success → error
  ══════════════════════════════════════ */
  function SwipeTrack({ state, progress, bidAmt, onPointerDown, dots }) {
    const isSuccess = state === 'success';
    const isLoading = state === 'loading';
    const isError   = state === 'error';
    const atThresh  = progress >= SUCCESS_THRESHOLD;

    const microcopy = getMicrocopy(state, progress, bidAmt);
    const fillPct   = Math.round(progress * 100);
    const thumbBot  = Math.round(progress * MAX_DRAG);

    const trackCls = [
      'relative rounded-3xl border-2 overflow-hidden cursor-pointer select-none transition-all duration-300',
      isSuccess ? 'border-copart-green bg-green-50 track-success'
      : atThresh ? 'border-copart-green bg-green-50 track-active'
      : 'border-copart-border bg-white',
    ].join(' ');

    const thumbBg = isSuccess  ? 'bg-copart-green'
      : isError    ? 'bg-red-600'
      : atThresh   ? 'bg-copart-greenlt'
      : 'shimmer-green';

    return (
      <div className="flex flex-col items-center gap-3">
        {/* Microcopy */}
        <AnimatePresence mode="wait">
          <motion.p
            key={microcopy}
            initial={{ opacity: 0, y: 3 }}
            animate={{ opacity: 1, y: 0 }}
            exit={{ opacity: 0, y: -3 }}
            transition={{ duration: 0.18 }}
            className={[
              'text-xs font-semibold text-center tracking-wide',
              isSuccess  ? 'text-copart-green'
              : isError  ? 'text-red-600'
              : isLoading? 'text-copart-muted'
              : atThresh ? 'text-copart-green'
              : 'text-copart-muted',
            ].join(' ')}
          >
            {microcopy}
          </motion.p>
        </AnimatePresence>

        {/* Track */}
        <div
          id="swipe-track"
          className={trackCls}
          style={{ width: 68, height: TRACK_HEIGHT }}
          onPointerDown={onPointerDown}
          onTouchStart={(e) => { e.preventDefault(); onPointerDown(e.touches[0]); }}
        >
          {/* Fill bar */}
          <div
            className="absolute bottom-0 left-0 right-0 transition-all"
            style={{
              height: `${fillPct}%`,
              background: isSuccess
                ? 'linear-gradient(to top, #1B7F3B, #34c963)'
                : 'linear-gradient(to top, #0033A0, #5B8FE8)',
              opacity: 0.15 + progress * 0.35,
              borderRadius: '1.5rem',
              transition: 'height 0.04s linear',
            }}
          />

          {/* Tick marks at 25%, 50%, 75% */}
          {[25, 50, 75].map(p => (
            <div key={p} className="absolute left-2.5 right-2.5"
              style={{ bottom: `${p}%`, height: 1, background: 'rgba(0,0,0,0.06)' }}
            />
          ))}

          {/* Percentage badge */}
          {progress > 0.05 && !isSuccess && !isLoading && (
            <div className="absolute top-3 left-0 right-0 flex justify-center">
              <span className="text-[10px] font-bold text-copart-navy bg-white/80 px-1.5 py-0.5 rounded-full">
                {fillPct}%
              </span>
            </div>
          )}

          {/* Floating success dots */}
          <AnimatePresence>
            {isSuccess && dots.map(d => (
              <motion.div key={d.id} exit={{ opacity: 0 }}
                className="float-dot absolute bottom-20 w-2 h-2 rounded-full bg-green-400"
                style={{ left: `calc(50% + ${d.x}px)` }}
              />
            ))}
          </AnimatePresence>

          {/* Success ripple */}
          {isSuccess && (
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="ripple-anim w-10 h-10 rounded-full bg-green-400/30" />
            </div>
          )}

          {/* ── THUMB ── */}
          <motion.div
            id="swipe-thumb"
            className="absolute left-0 right-0 mx-auto"
            style={{ bottom: thumbBot, height: THUMB_SIZE, width: THUMB_SIZE - 6 }}
            animate={isSuccess ? { scale: [1, 1.2, 1] } : {}}
            transition={{ duration: 0.35 }}
          >
            {/* Pulse ring (idle) */}
            {state === 'idle' && (
              <div className="pulse-ring absolute inset-0 rounded-2xl border-2 border-copart-green/40"
                style={{ margin: -5 }} />
            )}
            <div
              className={`absolute inset-0 rounded-2xl flex items-center justify-center shadow-md ${thumbBg}`}
              style={{
                boxShadow: isSuccess
                  ? '0 4px 16px rgba(27,127,59,0.45)'
                  : '0 4px 16px rgba(0,51,160,0.30)',
              }}
            >
              {/* Thumb icon: ✓ on success, ! on error, ↑ otherwise (no spinner) */}
              {isSuccess  ? <IconCheck /> :
               isError    ? <IconAlert /> :
               <IconArrowUp />}
            </div>
          </motion.div>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════
     TAP-TO-BID BUTTON  (secondary mode)
     – always re-enables after bid so user can bid again
  ══════════════════════════════════════ */
  function TapBidButton({ state, bidAmt, onTap }) {
    const isLoading = state === 'loading';
    const isError   = state === 'error';
    const disabled  = isLoading;

    return (
      <motion.button
        id="tap-bid-btn"
        onClick={onTap}
        disabled={disabled}
        whileTap={!disabled ? { scale: 0.965 } : {}}
        className={[
          'w-full py-4 rounded-xl text-sm font-bold tracking-wide transition-all duration-200 relative overflow-hidden',
          isError    ? 'bg-red-600 text-white'
          : isLoading ? 'bg-copart-navy/70 text-white cursor-not-allowed'
          : 'bg-copart-navy text-white active:bg-copart-navydk',
        ].join(' ')}
      >
        {isLoading && (
          <span className="absolute inset-0 flex items-center justify-center">
            <IconSpinner />
          </span>
        )}
        <span className={isLoading ? 'opacity-0' : ''}>
          {isError ? '⚠ Failed – Tap to Retry' : `Place Bid  ₹${bidAmt.toLocaleString('en-IN')}`}
        </span>
      </motion.button>
    );
  }

  /* ══════════════════════════════════════
     BIDDER CORE  (owns all state + gesture)
     ✅ Continuous bidding: auto-resets to idle after success
     ✅ Toast-based feedback: no alerts, no permanent locks
  ══════════════════════════════════════ */
  function BidderCore({ bidIncrement, currentBid, mode, onBidSuccess, onBidError }) {
    const [state,    setState]    = useState('idle');
    const [progress, setProgress] = useState(0);
    const [dots,     setDots]     = useState([]);

    const dragging  = useRef(false);
    const startY    = useRef(0);
    const rawDrag   = useRef(0);
    const inFlight  = useRef(false);  // prevents double-fire within a single bid attempt
    const resetTimer = useRef(null);

    const nextBidTotal = currentBid + bidIncrement;

    /* ── shared reset: completely instant ── */
    const resetToIdle = useCallback(() => {
      setState('idle');
      setProgress(0);
      setDots([]);
      inFlight.current = false;
    }, []);

    /* ── execute bid: ULTRA-FAST OPTIMISTIC — 0 wait time ── */
    const executeBid = useCallback((amount) => {
      if (inFlight.current) return;
      inFlight.current = true;

      // 1. Instant haptic
      vibrate([25]);

      // 2. Update bid total + global toast directly
      onBidSuccess(amount);

      // 3. Reset thumb instantly (0ms UI lock)
      resetToIdle();

      // 4. Fire API entirely in background
      mockPlaceBid(amount).catch(() => {
        vibrate([100]);
        onBidError();
      });
    }, [onBidSuccess, onBidError, resetToIdle]);

    /* cleanup timer no longer needed */
    useEffect(() => {}, []);

    /* ── POINTER MOVE ── */
    const onPointerMove = useCallback((e) => {
      if (!dragging.current) return;
      e.preventDefault();
      const cy = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
      const raw = Math.max(0, Math.min(startY.current - cy, MAX_DRAG / RESISTANCE));
      const resisted = raw * RESISTANCE;
      rawDrag.current = resisted;
      const p = Math.min(resisted / MAX_DRAG, 1);
      setProgress(prev => {
        if (p >= SUCCESS_THRESHOLD && prev < SUCCESS_THRESHOLD) vibrate(35);
        return p;
      });
    }, []);

    /* ── POINTER UP ── */
    const onPointerUp = useCallback(() => {
      if (!dragging.current) return;
      dragging.current = false;
      window.removeEventListener('pointermove', onPointerMove);
      window.removeEventListener('pointerup',   onPointerUp);
      window.removeEventListener('touchmove',   onPointerMove);
      window.removeEventListener('touchend',    onPointerUp);
      const p = rawDrag.current / MAX_DRAG;
      if (p >= SUCCESS_THRESHOLD) {
        executeBid(nextBidTotal);
      } else {
        setProgress(0);
        setState('idle');
      }
    }, [onPointerMove, executeBid, nextBidTotal]);

    /* ── POINTER DOWN (swipe start) ── */
    const onPointerDown = useCallback((e) => {
      // No state blocking at all — always responsive
      if (e.preventDefault) e.preventDefault();
      dragging.current  = true;
      startY.current    = e.clientY ?? e.touches?.[0]?.clientY ?? 0;
      rawDrag.current   = 0;
      setState('swiping');
      window.addEventListener('pointermove', onPointerMove, { passive: false });
      window.addEventListener('pointerup',   onPointerUp);
      window.addEventListener('touchmove',   onPointerMove, { passive: false });
      window.addEventListener('touchend',    onPointerUp);
    }, [state, onPointerMove, onPointerUp]);

    /* reset when mode toggle switches */
    useEffect(() => {
      resetToIdle();
    }, [mode]);

    /* ── tap handler (tap mode + swipe fallback link) ── */
    const handleTap = useCallback(() => {
      executeBid(nextBidTotal);
    }, [executeBid, nextBidTotal]);

    return mode === 'swipe' ? (
      <div className="flex flex-col items-center gap-2">
        <SwipeTrack
          state={state}
          progress={progress}
          bidAmt={bidIncrement}
          onPointerDown={onPointerDown}
          dots={dots}
        />
        <AnimatePresence>
          {(state === 'idle' || state === 'error') && (
            <motion.button
              initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
              onClick={handleTap}
              className="text-[11px] text-copart-muted underline underline-offset-2 hover:text-copart-navy transition-colors mt-1"
            >
              {state === 'error' ? 'Tap to Retry' : 'Tap to Bid Instead'}
            </motion.button>
          )}
        </AnimatePresence>
      </div>
    ) : (
      <TapBidButton state={state} bidAmt={nextBidTotal} onTap={handleTap} />
    );
  }

  /* ══════════════════════════════════════
     SPEC ROW
  ══════════════════════════════════════ */
  const SpecRow = ({ label, value, highlight }) => (
    <div className="flex justify-between items-center py-2 border-b border-copart-border last:border-0">
      <span className="text-xs text-copart-muted">{label}</span>
      <span className={`text-xs font-semibold ${highlight ? 'text-copart-red' : 'text-copart-text'}`}>{value}</span>
    </div>
  );

  /* ══════════════════════════════════════
     VEHICLE IMAGE BANNER
  ══════════════════════════════════════ */
  function VehicleBanner() {
    return (
      <div className="relative bg-gray-900 overflow-hidden" style={{ height: 190 }}>
        {/* Simulated car silhouette */}
        <div className="absolute inset-0 flex items-center justify-center"
          style={{ background: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)' }}>
          <svg viewBox="0 0 340 130" width="310" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.35">
            {/* Simple SUV/hatchback silhouette */}
            <rect x="20" y="70" width="300" height="35" rx="6" fill="#5B8FE8"/>
            <path d="M60 70 Q80 35 130 28 L210 28 Q250 28 280 70Z" fill="#5B8FE8"/>
            <circle cx="85"  cy="108" r="22" fill="#1a1a2e" stroke="#5B8FE8" strokeWidth="5"/>
            <circle cx="255" cy="108" r="22" fill="#1a1a2e" stroke="#5B8FE8" strokeWidth="5"/>
            <circle cx="85"  cy="108" r="8"  fill="#5B8FE8"/>
            <circle cx="255" cy="108" r="8"  fill="#5B8FE8"/>
            <rect x="130" y="32" width="80" height="32" rx="4" fill="#1a1a2e" opacity="0.5"/>
            <rect x="50"  y="55" width="50" height="18" rx="3" fill="#1a1a2e" opacity="0.4"/>
            <rect x="240" y="55" width="50" height="18" rx="3" fill="#1a1a2e" opacity="0.4"/>
          </svg>
        </div>
        <div className="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent" />

        {/* Badges */}
        <div className="absolute top-3 left-3 flex gap-2">
          <span className="bg-copart-red text-white text-[10px] font-bold px-2 py-1 rounded">SALVAGE</span>
          <span className="bg-black/50 text-white text-[10px] font-medium px-2 py-1 rounded backdrop-blur-sm">📷 38 Photos</span>
        </div>
        <div className="absolute top-3 right-3 bg-black/50 text-white text-[10px] font-medium px-2 py-1 rounded backdrop-blur-sm">
          LOT #99940955
        </div>

        {/* Live indicator */}
        <div className="absolute bottom-3 left-3 flex items-center gap-1.5 bg-black/60 px-2.5 py-1.5 rounded-full backdrop-blur-sm">
          <span className="live-dot w-2 h-2 rounded-full bg-red-400 inline-block" />
          <span className="text-white text-[10px] font-semibold">LIVE AUCTION</span>
        </div>
      </div>
    );
  }

  /* ══════════════════════════════════════
     APP ROOT
  ══════════════════════════════════════ */
  function App() {
    const [currentBid,   setCurrentBid]   = useState(BASE_CURRENT_BID);
    const [bidIncrement, setBidIncrement] = useState(BID_CHIPS[0]);
    const [bidMode,      setBidMode]      = useState('swipe');
    const [bidCount,     setBidCount]     = useState(24);
    const [toasts,       setToasts]       = useState([]); // Array of toasts (max 2)

    /* ── show a toast, max 2, auto-dismiss after 2s ── */
    const showToast = useCallback((amount, isError = false) => {
      const id = Date.now() + Math.random();
      setToasts(prev => {
        const newToast = { id, amount, isError };
        // Prepend new toast, keep at most 2
        return [newToast, ...prev].slice(0, 2);
      });

      // Independent timeout for each toast to auto-dismiss
      setTimeout(() => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, 2000);
    }, []);

    const handleBidSuccess = useCallback((newTotal) => {
      setCurrentBid(newTotal);
      setBidCount(c => c + 1);
      showToast(newTotal, false);
    }, [showToast]);

    const handleBidError = useCallback(() => {
      showToast(0, true);
    }, [showToast]);

    return (
      <div className="relative flex flex-col h-full bg-copart-gray overflow-hidden"
        style={{ maxWidth: 390, margin: '0 auto' }}>

        {/* ── TOP NAV ── */}
        <div className="bg-copart-navy flex items-center justify-between px-4 py-3 shrink-0">
          <button className="text-white flex items-center gap-1 text-sm font-medium">
            <IconChevronLeft /> Back
          </button>
          <div className="flex items-center gap-1">
            <span className="text-white font-black tracking-wide text-[15px]">eDiig fast bidding</span>
          </div>
          <div className="flex gap-3 text-white">
            <button><IconHeart /></button>
            <button><IconShare /></button>
          </div>
        </div>

        {/* ── VEHICLE IMAGE ── */}
        <VehicleBanner />

        {/* ── SCROLLABLE CONTENT ── */}
        <div className="flex-1 overflow-y-auto">
          {/* Vehicle Title */}
          <div className="bg-white px-4 py-3 border-b border-copart-border">
            <h1 className="text-base font-bold text-copart-text leading-snug">2021 KIA Soul LX</h1>
            <p className="text-xs text-copart-muted mt-0.5">CT – Hartford · VIN: KNDJ23AU9M7134891</p>
          </div>

          {/* Bid info strip */}
          <div className="bg-copart-navy/5 border-b border-copart-border px-4 py-3 flex justify-between items-center">
            <div>
              <p className="text-[10px] text-copart-muted uppercase tracking-wider font-medium">Current Bid</p>
              <p className="text-2xl font-black text-copart-text">₹{currentBid.toLocaleString('en-IN')}</p>
              <p className="text-[10px] text-copart-muted mt-0.5">{bidCount} bids · You haven't bid</p>
            </div>
            <div className="text-right">
              <p className="text-[10px] text-copart-muted uppercase tracking-wider font-medium">Ends in</p>
              <Countdown />
              <p className="text-[10px] text-copart-muted mt-0.5">Est. Retail: ₹9,20,000</p>
            </div>
          </div>

          {/* Spec table */}
          <div className="bg-white mx-3 my-2.5 rounded-xl border border-copart-border px-4 py-1">
            <SpecRow label="Odometer"     value="34,210 km" />
            <SpecRow label="Title Code"   value="Salvage" highlight />
            <SpecRow label="Primary Dmg"  value="Front End" />
            <SpecRow label="Engine"       value="2.0L 4-Cylinder" />
            <SpecRow label="Drive"        value="FWD" />
            <SpecRow label="Color"        value="Snow White Pearl" />
            <SpecRow label="Keys"         value="Present" />
          </div>
        </div>

        {/* ── FIXED BID PANEL ── */}
        <div className="bid-panel relative bg-white border-t border-copart-border px-4 pt-3 pb-5 shrink-0 z-10">
          
          {/* ── TOAST CONTAINER ── */}
          <div className="absolute bottom-full left-3 right-3 mb-3 flex flex-col-reverse gap-2 pointer-events-none z-50">
            <AnimatePresence mode="popLayout">
              {toasts.map(t => <BidToast key={t.id} toast={t} />)}
            </AnimatePresence>
          </div>

          {/* Row 1: increment label + toggle */}
          <div className="flex items-center justify-between mb-3">
            <div>
              <p className="text-[10px] text-copart-muted uppercase tracking-wider font-semibold">Bid Increment</p>
              <p className="text-sm font-bold text-copart-text">+₹{bidIncrement.toLocaleString('en-IN')}</p>
            </div>
            <ModeToggle mode={bidMode} onChange={setBidMode} />
          </div>

          {/* Row 2: Pricing chips */}
          <PricingChips
            selected={bidIncrement}
            onSelect={setBidIncrement}
            disabled={false}
          />

          <div className="mt-3">
            {/* Next bid indicator */}
            <p className="text-center text-[11px] text-copart-muted mb-2.5">
              Your bid: <span className="font-bold text-copart-text">
                ₹{(currentBid + bidIncrement).toLocaleString('en-IN')}
              </span>
              <span className="mx-1.5 text-copart-border">·</span>
              Buyer's fee est. <span className="font-semibold">₹3,200</span>
            </p>

            {/* BIDDER CORE: swipe or tap */}
            <BidderCore
              key={bidMode}
              bidIncrement={bidIncrement}
              currentBid={currentBid}
              mode={bidMode}
              onBidSuccess={handleBidSuccess}
              onBidError={handleBidError}
            />
          </div>

          {/* Copart-style disclaimer */}
          <p className="text-center text-[10px] text-copart-muted mt-2.5 leading-relaxed">
            By bidding you agree to the <span className="text-copart-navy underline">Terms of Use</span>.
            All sales are final.
          </p>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(
    <React.StrictMode><App /></React.StrictMode>
  );
</script>
</body>
</html>
