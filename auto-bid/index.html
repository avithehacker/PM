<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hammerly — Smart Auto Bidding</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#0057a8;--blue-d:#003d7a;--blue-l:#e8f1fb;--blue-m:#1a6fc4;
  --green:#1a8a3c;--green-l:#e6f5eb;
  --red:#c0392b;--red-l:#fdecea;
  --amber:#d97706;--amber-l:#fffbeb;
  --teal:#0d9488;--teal-l:#e6faf9;
  --purple:#7c3aed;--purple-l:#f3f0ff;
  --g100:#f5f6f8;--g200:#eaecf0;--g300:#d1d5db;--g400:#9ca3af;
  --g500:#6b7280;--g600:#4b5563;--g700:#374151;--g900:#111827;
  --white:#fff;
  --hh:56px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.1);
  --shadow-md:0 4px 14px rgba(0,0,0,.12);
  --shadow-lg:0 8px 30px rgba(0,0,0,.16);
  --r:4px;--rm:6px;
}
html{font-family:'Barlow',sans-serif;background:var(--g100);color:var(--g900);font-size:14px}
body{min-height:100vh;display:flex;flex-direction:column}
button{cursor:pointer;font-family:'Barlow',sans-serif;border:none;outline:none}
input,select{font-family:'Barlow',sans-serif}

/* ══ HEADER ══ */
.hdr{position:sticky;top:0;z-index:300;background:var(--blue-d);height:var(--hh);display:flex;align-items:center;padding:0 24px;gap:16px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.logo{display:flex;align-items:center;gap:9px;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:800;color:#fff;letter-spacing:.5px;white-space:nowrap}
.logo-icon{width:30px;height:30px;background:var(--blue-m);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px}
.logo span{color:#f0c040}
.hdr-div{width:1px;height:28px;background:rgba(255,255,255,.2);flex-shrink:0}
.hdr-nav{display:flex;gap:4px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--r);background:transparent;color:rgba(255,255,255,.65);font-size:13px;font-weight:600;transition:all .15s;position:relative}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-btn.on{background:rgba(255,255,255,.15);color:#fff}
.nav-btn.on::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:24px;height:2px;background:#f0c040;border-radius:2px}
.nav-badge{background:var(--red);color:#fff;border-radius:2px;font-size:10px;font-weight:700;padding:1px 5px;min-width:16px;text-align:center;line-height:16px}
.hdr-right{display:flex;align-items:center;gap:10px}
.live-pill{background:#e53935;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:2px;letter-spacing:1px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.6}}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--blue-m);display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700}

/* ══ HERO ══ */
.hero{background:linear-gradient(135deg,var(--blue-d) 0%,var(--blue-m) 100%);padding:28px 24px 24px;color:#fff}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:27px;font-weight:800;letter-spacing:.3px;margin-bottom:4px}
.hero p{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:16px}
.hero-stats{display:flex;gap:28px;flex-wrap:wrap}
.hero-stat-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;color:#f0c040;display:block}
.hero-stat-lbl{font-size:11px;color:rgba(255,255,255,.6);font-weight:500;letter-spacing:.3px}

/* ══ FILTERS ══ */
.filters{background:var(--white);border-bottom:1px solid var(--g200);padding:12px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:3px;border:1.5px solid var(--g300);background:var(--white);font-size:12px;font-weight:600;color:var(--g600);cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.chip.on{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}
.chip-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.filter-count{margin-left:auto;font-size:12px;color:var(--g500);font-weight:500}

/* ══ CARDS GRID ══ */
.grid{padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}

/* ══ AUCTION CARD ══ */
.ac{background:var(--white);border:1.5px solid var(--g200);border-radius:var(--rm);overflow:hidden;transition:box-shadow .2s,border-color .2s}
.ac:hover{box-shadow:var(--shadow-md)}
.ac.expanded{border-color:var(--blue-m);box-shadow:var(--shadow-md)}
.ac-head{padding:14px 16px 12px;border-bottom:1px solid var(--g200);display:flex;align-items:flex-start;gap:12px;cursor:pointer;user-select:none}
.ac-head:hover{background:var(--g100)}
.ac-emoji{width:48px;height:48px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ac-info{flex:1;min-width:0}
.ac-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--g900);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-sub{font-size:11px;color:var(--g400);font-weight:500}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:2px;letter-spacing:.3px;white-space:nowrap}
.badge-live{background:#fee2e2;color:#b91c1c}
.badge-upcoming{background:#fef3c7;color:#92400e}
.badge-closed{background:var(--g200);color:var(--g500)}
.ac-body{padding:12px 16px}
.ac-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ac-field{display:flex;flex-direction:column;gap:2px}
.ac-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g400)}
.ac-val{font-size:13px;font-weight:600;color:var(--g700)}
.bid-box{background:var(--g100);border-radius:var(--r);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.bid-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g400);margin-bottom:2px}
.bid-current{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--blue-d)}
.bid-step{font-size:11px;font-weight:600;color:var(--g500);margin-top:1px}
.ac-cta{width:100%;padding:9px 16px;border-radius:var(--r);background:var(--blue);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s}
.ac-cta:hover{background:var(--blue-m)}
.ac-cta.st-active{background:var(--teal)}
.ac-cta.st-active:hover{background:#0a8075}
.ac-cta.st-paused{background:var(--amber)}
.ac-cta.st-stopped{background:var(--g400);cursor:default}

/* ══ BID PANEL ══ */
.bid-panel{border-top:1px solid var(--g200);padding:14px 16px;background:#fafbfd}
.bp-hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bp-hd-line{flex:1;height:1px;background:var(--g200)}

/* max bid */
.mb-row{display:flex;gap:8px;align-items:stretch;margin-bottom:4px}
.mb-wrap{position:relative;flex:1}
.mb-prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:var(--g400);pointer-events:none}
.mb-inp{width:100%;padding:8px 12px 8px 28px;border:1.5px solid var(--g300);border-radius:var(--r);font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--g900);background:var(--white)}
.mb-inp:focus{outline:none;border-color:var(--blue)}
.mb-inp.valid{border-color:var(--green)}
.mb-inp.invalid{border-color:var(--red)}
.info-btn{width:34px;border-radius:var(--r);border:1.5px solid var(--g300);background:var(--white);color:var(--g500);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.info-btn:hover{border-color:var(--blue);color:var(--blue)}
.mb-hint{font-size:11px;font-weight:600;margin-bottom:10px}

/* sliders */
.sl-wrap{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.sl-row{display:flex;flex-direction:column;gap:5px}
.sl-top{display:flex;justify-content:space-between;align-items:baseline}
.sl-name{font-size:12px;font-weight:600;color:var(--g700)}
.sl-sub{font-size:10px;color:var(--g400);font-weight:500}
.sl-val{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800}
.sl-denom{font-size:11px;font-weight:500;color:var(--g400)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;outline:none;cursor:pointer}
input[type=range].blue-r{background:linear-gradient(to right,var(--purple) var(--fill,50%),var(--g200) var(--fill,50%))}
input[type=range].amber-r{background:linear-gradient(to right,var(--blue) var(--fill,50%),var(--g200) var(--fill,50%))}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;border:2px solid var(--white);box-shadow:0 1px 4px rgba(0,0,0,.25);cursor:pointer}
input[type=range].blue-r::-webkit-slider-thumb{background:var(--purple)}
input[type=range].amber-r::-webkit-slider-thumb{background:var(--blue)}
.total-bar{background:var(--blue-l);border-radius:var(--r);padding:8px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.total-bar.warn{background:var(--amber-l)}
.total-bar-lbl{font-size:11px;font-weight:600;color:var(--blue-d)}
.total-bar.warn .total-bar-lbl{color:var(--amber)}
.total-bar-val{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--blue-d)}
.total-bar.warn .total-bar-val{color:var(--amber)}
.enable-btn{width:100%;padding:10px;border-radius:var(--r);background:var(--teal);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.enable-btn:hover:not(:disabled){background:#0a8075}
.enable-btn:disabled{background:var(--g300);color:var(--g500);cursor:not-allowed}

/* ══ STATUS BAR ══ */
.st-bar{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);border:1.5px solid transparent;margin-bottom:10px}
.st-bar.active{background:var(--teal-l);border-color:rgba(13,148,136,.2)}
.st-bar.paused{background:var(--amber-l);border-color:rgba(217,119,6,.2)}
.st-bar.stopped{background:var(--red-l);border-color:rgba(192,57,43,.2)}
.st-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.st-dot.active{background:var(--teal);animation:pulse 2s infinite}
.st-dot.paused{background:var(--amber)}
.st-dot.stopped{background:var(--red)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(13,148,136,.4)}50%{box-shadow:0 0 0 5px rgba(13,148,136,0)}}
.st-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.st-label.active{color:var(--teal)}
.st-label.paused{color:var(--amber)}
.st-label.stopped{color:var(--red)}
.st-detail{margin-left:auto;font-size:11px;color:var(--g500);font-weight:500}

/* usage cards */
.usage-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.ucard{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:8px 10px;text-align:center}
.ucard-num{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:800}
.ucard-denom{font-size:12px;font-weight:500;color:var(--g400)}
.ucard-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--g400);margin-top:2px}

/* action buttons */
.act-row{display:flex;gap:7px;margin-bottom:12px}
.act-btn{flex:1;padding:8px 6px;border-radius:var(--r);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;border:1.5px solid transparent;transition:all .15s;white-space:nowrap}
.act-btn.pause{background:var(--amber-l);color:var(--amber);border-color:rgba(217,119,6,.3)}
.act-btn.pause:hover{background:var(--amber);color:#fff}
.act-btn.resume{background:var(--teal-l);color:var(--teal);border-color:rgba(13,148,136,.3)}
.act-btn.resume:hover{background:var(--teal);color:#fff}
.act-btn.stop{background:var(--red-l);color:var(--red);border-color:rgba(192,57,43,.3)}
.act-btn.stop:hover{background:var(--red);color:#fff}
.act-btn.manual{background:var(--blue-l);color:var(--blue);border-color:rgba(0,87,168,.3)}
.act-btn.manual:hover:not(:disabled){background:var(--blue);color:#fff}
.act-btn:disabled{opacity:.4;cursor:not-allowed}

/* mini history */
.mini-hist{max-height:160px;overflow-y:auto}
.hist-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--g200)}
.hist-row:last-child{border-bottom:none}
.htag{font-size:9px;font-weight:700;padding:2px 5px;border-radius:2px;letter-spacing:.3px;width:48px;text-align:center;flex-shrink:0}
.htag.auto{background:var(--purple-l);color:var(--purple)}
.htag.manual{background:var(--blue-l);color:var(--blue)}
.htag.comp{background:var(--g200);color:var(--g600)}
.htag.sys{background:var(--amber-l);color:var(--amber)}
.htime{font-size:10px;color:var(--g400);width:38px;flex-shrink:0}
.hdesc{flex:1;font-size:11px;color:var(--g700);font-weight:500}
.hamt{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;flex-shrink:0}
.hamt.auto{color:var(--purple)}
.hamt.manual{color:var(--blue)}
.hamt.comp{color:var(--g600)}

/* ══ TOAST STACK ══ */
.toast-stack{position:fixed;top:68px;right:18px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--white);border-radius:var(--rm);box-shadow:var(--shadow-lg);padding:11px 14px;display:flex;align-items:flex-start;gap:9px;min-width:270px;max-width:340px;pointer-events:auto;border-left:3px solid transparent;animation:t-in .22s ease;font-size:13px}
@keyframes t-in{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
.toast.success{border-left-color:var(--green)}
.toast.warning{border-left-color:var(--amber)}
.toast.error{border-left-color:var(--red)}
.toast.info{border-left-color:var(--blue)}
.toast.auto-bid{border-left-color:var(--purple)}
.t-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.t-body{flex:1}
.t-title{font-weight:700;color:var(--g900);margin-bottom:2px;font-size:13px}
.t-msg{font-size:11px;color:var(--g500)}
.t-close{color:var(--g400);font-size:17px;cursor:pointer;line-height:1;padding:0 2px;align-self:center}
.t-close:hover{color:var(--g700)}

/* ══ MODAL ══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .18s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:var(--rm);width:100%;max-width:480px;max-height:82vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:slidein .2s ease}
@keyframes slidein{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
.modal-hd{padding:16px 20px 14px;border-bottom:1px solid var(--g200);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--g900)}
.modal-close{width:28px;height:28px;border-radius:var(--r);background:var(--g100);color:var(--g600);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.modal-close:hover{background:var(--g200)}
.modal-body{padding:16px 20px}
.rule-row{display:flex;gap:11px;margin-bottom:13px}
.rule-num{width:24px;height:24px;border-radius:50%;background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rule-text{font-size:13px;color:var(--g700);line-height:1.55}
.rule-text strong{color:var(--g900)}
.rule-note{background:var(--amber-l);border:1px solid rgba(217,119,6,.25);border-radius:var(--r);padding:10px 12px;margin-top:10px;font-size:12px;color:var(--amber);font-weight:600;line-height:1.5}

/* ══ MY BIDS TAB ══ */
.tab-wrap{padding:20px 24px}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--g900);margin-bottom:14px}

/* battle row = one vehicle session */
.battle-row{margin-bottom:20px}
.battle-hdr{background:var(--white);border:1.5px solid var(--g200);border-radius:var(--rm) var(--rm) 0 0;border-bottom:none;padding:11px 16px;display:flex;align-items:center;gap:12px}
.battle-emoji{width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.battle-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;color:var(--g900);flex:1}
.battle-sub{font-size:11px;color:var(--g400);font-weight:500;margin-top:1px}
.battle-status-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:2px;letter-spacing:.4px;white-space:nowrap}

.battle-cards{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1.5px solid var(--g200);border-radius:0 0 var(--rm) var(--rm);overflow:hidden}

/* individual bidder card */
.bidder-card{background:var(--white);padding:14px 15px;position:relative;transition:background .25s}
.bidder-card + .bidder-card{border-left:1.5px solid var(--g200)}
.bidder-card.winning{background:linear-gradient(160deg,rgba(13,148,136,.04) 0%,rgba(13,148,136,.01) 100%)}
.bidder-card.outbid{background:linear-gradient(160deg,rgba(192,57,43,.04) 0%,rgba(192,57,43,.01) 100%)}

/* bidder label row */
.bidder-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.bidder-name{font-size:13px;font-weight:800;color:var(--g900);display:flex;align-items:center;gap:6px}
.bidder-you{font-size:9px;font-weight:700;padding:2px 5px;border-radius:2px;background:var(--blue-l);color:var(--blue);vertical-align:middle}
.bid-status-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:2px;letter-spacing:.5px;white-space:nowrap}
.bid-status-badge.winning{background:#d1fae5;color:#065f46}
.bid-status-badge.outbid{background:var(--red-l);color:var(--red)}
.bid-status-badge.leading{background:#fde8e8;color:var(--red)}
.bid-status-badge.idle{background:var(--g200);color:var(--g500)}

/* amount display */
.bidder-amount{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1;margin-bottom:3px}
.bidder-amount.winning{color:var(--teal)}
.bidder-amount.outbid{color:var(--red)}
.bidder-amount.leading{color:var(--red)}
.bidder-amount.idle{color:var(--g400)}
.bidder-amount.you{color:var(--blue-d)}
.bidder-sub{font-size:10px;font-weight:600;color:var(--g400);margin-bottom:10px}

/* avinash stats */
.bidder-stats{display:flex;gap:10px;margin-bottom:10px}
.bstat{text-align:center}
.bstat-n{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;display:block}
.bstat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--g400);display:block}

/* action buttons */
.bidder-acts{display:flex;flex-direction:column;gap:5px}
.bact-row{display:flex;gap:5px}

/* rival card */

.rival-fire-btn.firing{animation:rival-flash .4s ease}
@keyframes rival-flash{0%{transform:scale(1)}30%{transform:scale(.97);background:#fecaca}70%{transform:scale(1.01)}100%{transform:scale(1)}}
.rival-bid-count{font-size:10px;color:var(--g400);font-weight:600;margin-bottom:8px}

/* bid history */
.sess-stats{display:flex;gap:14px;margin-bottom:12px}

.ht-hd{display:grid;grid-template-columns:44px 1fr 110px 60px 90px;padding:9px 14px;background:var(--g100);border-bottom:1px solid var(--g200);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);gap:8px}
.ht-row{display:grid;grid-template-columns:44px 1fr 110px 60px 90px;padding:9px 14px;border-bottom:1px solid var(--g200);font-size:12px;align-items:center;gap:8px}

/* ══ SIMULATOR TAB ══ */
.sim-wrap{padding:20px 24px;display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:flex-start}

.sim-t{font-size:10px;color:var(--g400);font-weight:500;width:40px;flex-shrink:0}

.sim-ctrl-card{background:var(--white);border:1.5px solid var(--g200);border-radius:var(--rm);overflow:hidden}
.sim-ctrl-hd{padding:13px 16px;border-bottom:1px solid var(--g200)}

.vehicle-sel{width:100%;padding:8px 10px;border:1.5px solid var(--g300);border-radius:var(--r);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;color:var(--g700);background:var(--white);margin-bottom:12px}

/* ══ EMPTY ══ */

/* ══ APP SWITCHER ══ */

.place-bid-btn{width:100%;padding:12px 16px;border-radius:var(--r);background:var(--green);color:#fff;font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;margin-bottom:8px;letter-spacing:.2px}

.place-bid-btn:disabled{background:var(--g300);color:var(--g500);cursor:not-allowed}
.ob-start-btn{width:100%;padding:10px;border-radius:var(--r);background:var(--green);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.ob-start-btn:hover:not(:disabled){background:#146830}
.ob-start-btn:disabled{background:var(--g300);color:var(--g500);cursor:not-allowed}
.ac-cta.st-open{background:var(--green)}
.ac-cta.st-open:hover{background:#146830}
/* auction type badges on card */
.badge-open-auction{background:var(--green-l);color:var(--green)}
.badge-closed-auction{background:var(--g200);color:var(--g600)}
/* sealed bid display */
.bid-sealed-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--g400);letter-spacing:3px}
.sealed-pill{display:inline-flex;align-items:center;gap:4px;background:var(--g200);color:var(--g500);font-size:10px;font-weight:700;padding:3px 7px;border-radius:2px;letter-spacing:.5px;margin-top:2px}
.nirav-sealed{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;color:var(--g400);letter-spacing:4px}

/* ══ RESPONSIVE ══ */
@media(max-width:900px){
  .sim-wrap{grid-template-columns:1fr}
  .sim-ctrl-card{order:-1}
}
@media(max-width:640px){
  .grid{grid-template-columns:1fr;padding:14px 16px}
  .hero{padding:20px 16px}
  .hero-stats{gap:18px}
  .filters,.tab-wrap{padding:10px 16px}
  .nav-btn .nav-label{display:none}
  .hdr-nav{gap:2px}
  .nav-btn{padding:6px 10px}
  .sim-wrap{padding:14px 16px}
  .app-sw{display:none}
  .battle-cards{grid-template-columns:1fr}
  .bidder-card+.bidder-card{border-left:none;border-top:1.5px solid var(--g200)}
}

  .usage-grid{gap:6px}
  .act-row{flex-wrap:wrap}
  .act-btn{min-width:calc(50% - 4px)}
  .ht-hd,.ht-row{grid-template-columns:40px 1fr 100px 55px;gap:6px}
  .ht-hd>*:nth-child(5),.ht-row>*:nth-child(5){display:none}
}
