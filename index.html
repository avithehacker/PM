<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Avinash Singh is a Product Manager based in Bangalore, building at Mahindra. From Varanasi.">
    <link rel="icon" type="image/png" href="https://github.com/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #ffffff;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            padding: 80px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            margin-bottom: 60px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .roles {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .roles p {
            font-size: 0.88rem;
            color: #1a1a1a;
            font-weight: 400;
            letter-spacing: 0.01em;
            line-height: 1.6;
        }

        /* inline links — Mahindra, Dharnika */
        .roles a {
            color: #111;
            text-decoration: underline;
            text-decoration-color: rgba(0,0,0,0.3);
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s;
        }

        .roles a:hover {
            text-decoration-color: #111;
        }

        section {
            margin-bottom: 48px;
        }

        h2 {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #777;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            padding-bottom: 8px;
        }

        ul.links {
            list-style: none;
        }

        ul.links li {
            margin-bottom: 20px;
        }

        /* clickable item links — First Draft */
        .link-item {
            display: block;
            text-decoration: none;
            color: #111;
            cursor: pointer;
            transition: color 0.2s;
        }

        .link-item:hover {
            color: #000;
        }

        .link-item:hover .link-title {
            text-decoration: underline;
            text-decoration-color: #111;
            text-underline-offset: 3px;
        }

        .link-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 400;
            display: block;
            margin-bottom: 4px;
            text-decoration: underline;
            text-decoration-color: rgba(0,0,0,0.25);
            text-underline-offset: 3px;
        }

        /* connect links — LinkedIn, Resume */
        .connect-links {
            display: flex;
            gap: 28px;
        }

        .connect-links .link-item {
            display: inline-block;
        }

        .connect-links .link-item .link-title {
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            color: #111;
            text-decoration: underline;
            text-decoration-color: rgba(0,0,0,0.3);
            text-underline-offset: 3px;
            transition: text-decoration-color 0.2s;
        }

        .connect-links .link-item:hover .link-title {
            text-decoration-color: #111;
        }

        .connect-links .link-item:hover {
            color: #000;
        }

        .link-desc {
            font-size: 0.8rem;
            color: #555;
            font-weight: 400;
            margin-top: 2px;
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.75rem;
            color: #999;
            text-align: center;
        }

        @media (max-width: 600px) {
            body {
                padding: 60px 24px;
            }

            h1 {
                font-size: 2.2rem;
            }
            
            .container {
                margin-top: 0;
            }
        }

<body>
    <div class="container">
        <header>
            <h1 id="name-header">Avinash Singh</h1>
            <div class="roles">
                <p>Product Manager at <a href="https://www.mahindrafirstchoice.com/" target="_blank">Mahindra</a></p>
                <p>Founder of <a href="https://dharnikafoundation.org/" target="_blank">Dharnika</a></p>
                <p>Based in Bangalore &mdash; from Varanasi</p>
            </div>
        </header>

        <section>
            <h2>Featured Work</h2>
            <ul class="links">
                <li>
                    <a href="drafts.html" class="link-item">
                        <span class="link-title">First Draft</span>
                        <span class="link-desc">A curated collection of early-stage product prototypes and design documents.</span>
                    </a>
                </li>
            </ul>
        </section>

        <section>
            <h2>Connect</h2>
            <div class="connect-links">
                <a href="https://www.linkedin.com/in/avithehacker/" target="_blank" class="link-item">
                    <span class="link-title">LinkedIn</span>
                </a>
                <a href="pdf/resume/Avinash-Singh-Resume.pdf" target="_blank" class="link-item">
                    <span class="link-title">Resume</span>
                </a>
            </div>
        </section>

        <footer>
            &copy; 2026 Avinash Singh
        </footer>
    </div>
    
    <script>
        // Easter egg
        let aCount = 0, aTimer;
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a') {
                aCount++;
                clearTimeout(aTimer);
                aTimer = setTimeout(() => { aCount = 0; }, 800);
                if (aCount >= 3) { aCount = 0; window.location.href = 'avi/index.html'; }
            }
        });

        let tapCount = 0, tapTimer;
        const nameEl = document.getElementById('name-header');
        if (nameEl) {
            nameEl.addEventListener('click', () => {
                tapCount++;
                clearTimeout(tapTimer);
                tapTimer = setTimeout(() => { tapCount = 0; }, 1200);
                if (tapCount >= 3) { tapCount = 0; window.location.href = 'avi/index.html'; }
            });
        }
    </script>
</body>

</html>
