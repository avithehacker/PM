<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Auctimeter 2.0 — E2R Collections Digital Twin</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-w:240px;
  --header-h:58px;
  --navy:#1F4E79;
  --navy-dark:#163a5c;
  --navy-light:#2563a8;
  --bg:#EEF2F7;
  --white:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --border:#e2e8f0;
  --green:#16a34a;--green-bg:#dcfce7;
  --blue:#2563eb;--blue-bg:#dbeafe;
  --red:#dc2626;--red-bg:#fee2e2;
  --amber:#d97706;--amber-bg:#fef3c7;
  --grey:#6b7280;--grey-bg:#f3f4f6;
  --bidkaro:#1a56db;
  --ediig:#0f766e;
  --cartrade:#c2410c;
  --cardekho:#b91c1c;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{text-decoration:none;color:inherit}

/* ── SIDEBAR ── */
#sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:var(--navy);display:flex;flex-direction:column;z-index:200;overflow-y:auto}
.sb-logo{padding:18px 20px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-logo-title{color:#fff;font-size:16px;font-weight:700;letter-spacing:.3px}
.sb-logo-sub{color:rgba(255,255,255,.55);font-size:10.5px;margin-top:2px}
.sb-nav{padding:10px 0;flex:1}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.75);cursor:pointer;transition:.15s;border-left:3px solid transparent;font-size:13.5px}
.sb-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-item.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:#60a5fa;font-weight:600}
.sb-item i{font-size:16px;flex-shrink:0}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);font-size:11px}

/* ── HEADER ── */
#header{position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--header-h);background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.1);display:flex;align-items:center;padding:0 24px;z-index:100;gap:16px}
#header-title{font-size:15px;font-weight:600;color:var(--navy);flex:1}
#header-sub{font-size:12px;color:var(--muted);flex:1}
.header-badge{background:var(--blue-bg);color:var(--blue);padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:600}

/* ── MAIN ── */
#main{margin-left:var(--sidebar-w);margin-top:var(--header-h);padding:24px;min-height:calc(100vh - var(--header-h))}

/* ── PAGES ── */
.page{display:none}
.page.active{display:block}
.page-title{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:4px}
.page-desc{color:var(--muted);font-size:13px;margin-bottom:20px}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px}
.kpi-card{background:#white;background-color:#white;background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:4px solid var(--kpi-color,#94a3b8);display:flex;flex-direction:column;gap:4px}
.kpi-val{font-size:22px;font-weight:700;color:var(--text)}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi-sub{font-size:11.5px;color:var(--muted)}
.kpi-icon{font-size:22px;align-self:flex-end;opacity:.4;margin-top:-4px}

/* ── CARDS ── */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);padding:18px}
.card-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:7px}

/* ── GRID ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--navy);color:#fff;position:sticky;top:0;z-index:10}
thead th{padding:10px 12px;text-align:left;font-weight:600;font-size:12px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:.1s}
tbody tr:hover{background:#f8fafc}
tbody td{padding:9px 12px;white-space:nowrap;vertical-align:middle}
.tbl-sm td,.tbl-sm th{padding:7px 10px}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.badge-paid{background:var(--green-bg);color:var(--green)}
.badge-pending{background:var(--blue-bg);color:var(--blue)}
.badge-overdue{background:var(--red-bg);color:var(--red)}
.badge-partial{background:var(--amber-bg);color:var(--amber)}
.badge-grey{background:var(--grey-bg);color:var(--grey)}
.badge-platform{color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.bp-bidkaro{background:var(--bidkaro)} .bp-ediig{background:var(--ediig)} .bp-cartrade{background:var(--cartrade)} .bp-cardekho{background:var(--cardekho)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:.15s;text-align:center;justify-content:center}
.btn-primary{background:var(--navy);color:#fff} .btn-primary:hover{background:var(--navy-dark)}
.btn-success{background:var(--green);color:#fff} .btn-success:hover{background:#15803d}
.btn-danger{background:var(--red);color:#fff} .btn-danger:hover{background:#b91c1c}
.btn-outline{background:#fff;color:var(--navy);border:1px solid var(--navy)} .btn-outline:hover{background:var(--navy);color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11.5px;gap:3px}

/* ── FILTER TABS ── */
.filter-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.ftab{padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12.5px;font-weight:500;background:#fff;border:1px solid var(--border);color:var(--muted);transition:.15s}
.ftab.active,.ftab:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── SEARCH BAR ── */
.search-row{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.search-input{flex:1;min-width:180px;padding:7px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none}
.search-input:focus{border-color:var(--navy)}

/* ── ACTIVITY FEED ── */
.activity-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);align-items:center}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}

/* ── VEHICLE CARDS ── */
.vc-reg{font-family:monospace;font-size:12.5px;font-weight:700;color:var(--navy);background:rgba(31,78,121,0.08);padding:2px 6px;border-radius:4px;letter-spacing:.3px}
.progress-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:.3s}

/* ── MODALS ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:12px;width:min(560px,96vw);max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:700;color:var(--navy)}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);line-height:1}
.modal-body{padding:20px 22px}
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:5px}
.form-control{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;outline:none;font-family:inherit}
.form-control:focus{border-color:var(--navy)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;padding:4px 0}
.detail-item{} .detail-item .dl{font-size:11.5px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px;font-weight:500} .detail-item .dv{font-size:13px;font-weight:600;color:var(--text)}

/* ── TOAST ── */
#toast-container{position:fixed;top:70px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 16px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 12px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;animation:slideIn .25s ease;min-width:260px}
.toast-success{background:var(--green);color:#fff} .toast-error{background:var(--red);color:#fff} .toast-warning{background:var(--amber);color:#fff}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── CHART CONTAINERS ── */
.chart-wrap{position:relative;height:220px}

/* ── EST VAL BOX ── */
.rres{background:var(--grey-bg);padding:16px;border-radius:8px;margin-top:16px;animation:sd .3s}
@keyframes sd{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.erbig{font-size:28px;font-weight:700;color:var(--navy);margin:8px 0}
.rb{padding:10px 16px;border-radius:6px;font-size:13px;font-weight:700;margin:10px 0}
.rby{background:#E2EFDA;color:#375623} .rbn{background:#FFE0E0;color:#cc0000}

/* ── FOOTER ── */
.page-footer{margin-top:32px;padding-top:14px;border-top:1px solid var(--border);color:var(--muted);font-size:11.5px;text-align:center}

/* ── SUB-NAV ── */
.sb-sub-group{background:rgba(0,0,0,.18)}
.sb-sub-item{display:flex;align-items:center;gap:10px;padding:8px 20px 8px 36px;color:rgba(255,255,255,.6);cursor:pointer;transition:.15s;border-left:3px solid transparent;font-size:12.5px}
.sb-sub-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-sub-item.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:#60a5fa;font-weight:600}
.sb-sub-item i{font-size:14px;flex-shrink:0}
.sb-chevron{margin-left:auto;font-size:11px;transition:transform .2s}
.sb-item.expanded .sb-chevron{transform:rotate(-180deg)}

/* ── UPLOAD ZONE ── */
.drop-zone{border:2px dashed var(--border);border-radius:10px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s;background:#fafbfc}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--navy);background:var(--blue-bg)}
.drop-zone i{font-size:40px;color:var(--muted);display:block;margin-bottom:12px}
.stepper{display:flex;gap:0;margin-bottom:22px}
.step{flex:1;text-align:center;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:16px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.step.done::after{background:var(--green)}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-size:13px;font-weight:700;position:relative;z-index:1}
.step.active .step-dot{background:var(--navy);color:#fff}
.step.done .step-dot{background:var(--green);color:#fff}
.step.idle .step-dot{background:var(--border);color:var(--muted)}
.step-label{font-size:11px;color:var(--muted);font-weight:500}
.step.active .step-label,.step.done .step-label{color:var(--text);font-weight:600}
.col-tag{display:inline-block;padding:3px 9px;border-radius:4px;font-size:11.5px;font-weight:600;margin:3px}
.chart-wrap-sm{position:relative;height:180px}
.stat-box{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.07);text-align:center}
.stat-box .sv{font-size:24px;font-weight:700;color:var(--navy)}
.stat-box .sl{font-size:12px;color:var(--muted);margin-top:2px}
.badge-rc-complete{background:var(--green-bg);color:var(--green);font-size:11px;padding:2px 8px;border-radius:4px}
.badge-rc-progress{background:var(--blue-bg);color:var(--blue);font-size:11px;padding:2px 8px;border-radius:4px}
.badge-rc-notstarted{background:var(--grey-bg);color:var(--grey);font-size:11px;padding:2px 8px;border-radius:4px}
.btn-amber{background:var(--amber);color:#fff} .btn-amber:hover{background:#b45309}
.vc-card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);padding:16px;display:flex;flex-direction:column;gap:8px}
.vc-model{font-size:12.5px;color:var(--muted)}
.vc-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px}
.vc-label{color:var(--muted)}
.vc-val{font-weight:600;color:var(--text)}
.notif-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center}
.notif-item:last-child{border-bottom:none}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.notif-dot.sent{background:var(--green)} .notif-dot.pending{background:var(--amber)}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle{position:relative;width:38px;height:20px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;background:#cbd5e1;border-radius:20px;transition:.2s}
.toggle-slider::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--navy)}
.toggle input:checked+.toggle-slider::after{transform:translateX(18px)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #sidebar{transform:translateX(-100%);transition:.25s}
  #sidebar.open{transform:translateX(0)}
  #header{left:0}
  #main{margin-left:0}
  .kpi-row{grid-template-columns:1fr 1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
  #mob-toggle{display:flex!important}
}
#mob-toggle{display:none;background:none;border:none;cursor:pointer;font-size:22px;color:var(--navy)}
</style>

const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(n){if(n===null||n===undefined||n==='')return '—';return '₹'+Number(n).toLocaleString('en-IN');}
function fd(d){if(!d)return '—';const dt=new Date(d+'T00:00:00');return String(dt.getDate()).padStart(2,'0')+'-'+MN[dt.getMonth()]+'-'+dt.getFullYear();}
function addD(d,n){const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function dAgo(d){return Math.floor((new Date('2026-03-13')-new Date(d+'T00:00:00'))/86400000);}
function gv(id){return V.find(v=>v.id===id)||{};}
function gl(vi){return L.find(l=>l.vi===vi)||{};}

function bb(s){
  const m={
    'Active':'badge-paid',
    'Approved':'badge-paid',
    'Paid':'badge-paid',
    'Released':'badge-paid',
    'Delivered':'badge-paid',
    'Closed':'badge-grey',
    'In Auction':'badge-pending',
    'In Inspection':'badge-pending',
    'In Yard':'badge-pending',
    'In Progress':'badge-pending',
    'Pending':'badge-pending',
    'EMI Default':'badge-overdue',
    'Rejected':'badge-overdue',
    'Closed - Awaiting Payment':'badge-partial',
    'Repo Ordered':'badge-partial',
    'Payment Pending':'badge-partial',
    'Notice Sent':'badge-partial',
    'Court Case Filed':'badge-overdue'
  };
  return '<span class="badge '+(m[s]||'badge-grey')+'">'+s+'</span>';
}

function sbg(s){
  if(s==='Complete')return '<span class="badge badge-paid"><i class="bi bi-check-circle-fill"></i> Complete</span>';
  if(s==='In Progress')return '<span class="badge badge-pending"><i class="bi bi-arrow-repeat"></i> In Progress</span>';
  return '<span class="badge badge-grey"><i class="bi bi-dash-circle"></i> Not Started</span>';
}

// ── TOAST ─────────────────────────────────────────────────────────────
function toast(msg,type){
  type=type||'success';
  if(type==='wr') type='warning';
  const container = document.getElementById('toast-container');
  if(!container) return;
  const el = document.createElement('div');
  el.className = 'toast toast-'+type;
  
  let icon = 'bi-check-circle-fill';
  if(type==='error') icon = 'bi-x-circle-fill';
  if(type==='warning') icon = 'bi-exclamation-triangle-fill';
  
  el.innerHTML = `<i class="bi ${icon}"></i> <span>${msg}</span>`;
  container.appendChild(el);
  
  setTimeout(function(){
    el.style.opacity = '0';
    el.style.transform = 'translateX(60px)';
    el.style.transition = 'all 0.25s ease';
    setTimeout(function(){
      el.remove();
    }, 260);
  }, 3000);
}

    if(n&&n.sub&&n.sub.length)nav(n.sub[0].id);
  } else {
    sub.style.display='none';
    if(item)item.classList.remove('expanded');
  }
}

function nav(pg){
  // Redirect bare 'payments' to first sub-page
  if(pg==='payments'){
    const sub=document.getElementById('sub-payments');
    if(sub){sub.style.display='block';}
    const pi=document.querySelector('.sb-item[data-page="payments"]');
    if(pi)pi.classList.add('expanded');
    nav('pay-dashboard');
    return;
  }
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.sb-item,.sb-sub-item').forEach(e=>e.classList.remove('active'));
  const pe=document.getElementById('pg-'+pg);if(pe)pe.classList.add('active');
  const ne=document.querySelector(`.sb-item[data-page="${pg}"]`)||document.querySelector(`.sb-sub-item[data-page="${pg}"]`);
  if(ne)ne.classList.add('active');
  // If sub-page, highlight parent + keep sub open
  if(pg.startsWith('pay-')){
    const pi=document.querySelector('.sb-item[data-page="payments"]');
    if(pi){pi.classList.add('active');pi.classList.add('expanded');}
    const sub=document.getElementById('sub-payments');
    if(sub)sub.style.display='block';
  }
  // Update header title
  const allNav=NAV.flatMap(n=>n.sub?[n,...n.sub]:[n]);
  const found=allNav.find(x=>x.id===pg);
  document.getElementById('header-title').textContent=found?found.lbl:'';
  chs.forEach(c=>{try{c.destroy();}catch(e){}});chs=[];
  // Render
  if(pg==='dashboard')rDash();
  else if(pg==='emi')rEMI();
  else if(pg==='repodec')rRepoDec();
  else if(pg==='repo')rRepo();
  else if(pg==='yard')rYard();
  else if(pg==='inspect')rInspect();
  else if(pg==='auction')rAuction();
  else if(pg==='payments')rPay();
  else if(pg==='release')rRelease();
  else if(pg==='pay-dashboard')renderPayDashboard();
  else if(pg==='pay-upload')renderPayUpload();
  else if(pg==='pay-tracker')renderPayTracker();
  else if(pg==='pay-notifications')renderPayNotifications();
  else if(pg==='pay-vehicles')renderPayVehicles();
  else if(pg==='pay-reports')renderPayReports();
  document.getElementById('sidebar').classList.remove('open');
}

        <div style="background:var(--grey-bg);padding:10px;border-radius:6px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">Current Bid</div>
          <div style="font-size:14px;font-weight:700;color:${isAbove?'var(--green)':'var(--red)'};margin-top:2px">${fmt(a.cb)}</div>
        </div>
        <div style="background:var(--grey-bg);padding:10px;border-radius:6px;text-align:center">
          <div style="font-size:11px;color:var(--muted)">Bids Count</div>
          <div style="font-size:14px;font-weight:700;color:var(--text);margin-top:2px">${a.bc} bids</div>

const pcFmtL=n=>{if(n>=10000000)return '₹'+(n/10000000).toFixed(2)+'Cr';if(n>=100000)return '₹'+(n/100000).toFixed(1)+'L';return '₹'+Number(n).toLocaleString('en-IN');}
function pcStatusBadge(s){const map={paid:'badge-paid',pending:'badge-pending',overdue:'badge-overdue',partial:'badge-partial'};const icons={paid:'bi-check-circle',pending:'bi-clock',overdue:'bi-exclamation-triangle',partial:'bi-half'};return `<span class="badge ${map[s]||'badge-grey'}"><i class="bi ${icons[s]||'bi-dash'}"></i> ${s.charAt(0).toUpperCase()+s.slice(1)}</span>`;}
function pcPlatformBadge(p){const cls={Bidkaro:'bp-bidkaro',eDiig:'bp-ediig',CarTrade:'bp-cartrade',CarDekho:'bp-cardekho'};return `<span class="badge-platform ${cls[p]||''}">${p}</span>`;}
function pcRcBadge(r){if(!r||r==='Not Started')return `<span class="badge-rc-notstarted">Not Started</span>`;if(r==='Complete')return `<span class="badge-rc-complete">Complete</span>`;return `<span class="badge-rc-progress">In Progress</span>`;}
function pcNotifBadge(n){return n?`<span class="badge" style="background:#dcfce7;color:#16a34a;font-size:11px"><i class="bi bi-check"></i> Yes</span>`:`<span class="badge badge-grey" style="font-size:11px"><i class="bi bi-x"></i> No</span>`;}

function pcHandleFileUpload(input){if(input.files[0]) pcProcessFile(input.files[0]);}
function pcProcessFile(file){
  const status=document.getElementById('pc-upload-status');
  if(!status)return;
  status.style.display='block';
  status.innerHTML=`<div style="display:flex;align-items:center;gap:8px;color:var(--blue)"><i class="bi bi-hourglass-split"></i> Processing: <strong>${file.name}</strong></div>`;
  setTimeout(()=>{
    status.innerHTML=`<div style="display:flex;align-items:center;gap:8px;color:var(--green)"><i class="bi bi-check-circle"></i> File loaded: <strong>${file.name}</strong> (${(file.size/1024).toFixed(1)} KB)</div>`;
    pcShowPreview();
    pcAdvanceStepper(2);
  },800);
}
function pcShowPreview(){
  const card=document.getElementById('pc-preview-card');
  if(!card)return;
  card.style.display='block';
  document.getElementById('pc-preview-count').textContent='(showing sample 5 rows)';
  const sample=DEMANDS.slice(0,5);
  document.getElementById('pc-preview-wrap').innerHTML=`<table>
    <thead><tr><th>Lot No</th><th>Reg. No.</th><th>Make</th><th>Model</th><th>Year</th><th>Buyer</th><th>Hammer Price</th><th>Due Date</th></tr></thead>
    <tbody>${sample.map(d=>`<tr><td>${d.lot}</td><td>${d.reg}</td><td>${d.make}</td><td>${d.model}</td><td>${d.year}</td><td>${d.buyer}</td><td>${pcFmt(d.hammer)}</td><td>${d.dueDate}</td></tr>`).join('')}</tbody>
  </table>`;
}
function pcAdvanceStepper(to){
  for(let i=1;i<=4;i++){
    const s=document.getElementById('pc-step-'+i);
    if(!s)continue;
    if(i<to){s.className='step done';s.querySelector('.step-dot').innerHTML='<i class="bi bi-check"></i>';}
    else if(i===to){s.className='step active';}
    else{s.className='step idle';}
  }
}
function pcConfirmImport(){
  pcAdvanceStepper(3);
  toast('24 auction records imported successfully. Payment demands generated.');
  setTimeout(()=>pcAdvanceStepper(4),500);
  const card=document.getElementById('pc-preview-card');if(card)card.style.display='none';
}
function pcCancelImport(){
  const card=document.getElementById('pc-preview-card');if(card)card.style.display='none';
  const st=document.getElementById('pc-upload-status');if(st)st.style.display='none';
}
function pcSendAllNotifications(){toast('WhatsApp and SMS notifications sent to all 24 buyers.');}
function pcDownloadTemplate(){
  if(typeof XLSX==='undefined'){toast('SheetJS not loaded.');return;}
  const headers=['Auction ID','Lot No','Reg. No.','Make','Model','Variant','Year','Type','Chassis No','Engine No','Colour','Yard Location','Platform','Reserve Price','Hammer Price','No. of Bids','Buyer Name','Company','Mobile','EMD Paid','Due Date','Auction Date'];
  const ws=XLSX.utils.aoa_to_sheet([headers]);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'AuctionData');
  XLSX.writeFile(wb,'PayCollect_Template.xlsx');
  toast('Template downloaded: PayCollect_Template.xlsx');
}

// ── S8f: PAY REPORTS ──────────────────────────────────────────────────
function renderPayReports(){
  const pg=document.getElementById('pg-pay-reports');
  const totalHammer=DEMANDS.reduce((a,d)=>a+d.hammer,0);
  const totalPaid=DEMANDS.filter(d=>d.status==='paid').reduce((a,d)=>a+d.balancePaid+d.emd,0);
  const totalPending=DEMANDS.filter(d=>['pending','partial'].includes(d.status)).reduce((a,d)=>a+d.balanceDue,0);
  const totalOverdue=DEMANDS.filter(d=>d.status==='overdue').reduce((a,d)=>a+d.balanceDue,0);

  const statBoxes=[
    {label:'Total Auction Value',val:pcFmtL(totalHammer),icon:'bi-currency-rupee',color:'#1F4E79'},
    {label:'Total Collected',val:pcFmtL(totalPaid),icon:'bi-check-circle',color:'#16a34a'},
    {label:'Total Pending',val:pcFmtL(totalPending),icon:'bi-hourglass-split',color:'#d97706'},
    {label:'Total Overdue',val:pcFmtL(totalOverdue),icon:'bi-exclamation-triangle',color:'#dc2626'},
  ].map(s=>`<div class="stat-box" style="border-top:3px solid ${s.color}"><i class="bi ${s.icon}" style="font-size:22px;color:${s.color}"></i><div class="sv" style="color:${s.color};font-size:20px">${s.val}</div><div class="sl">${s.label}</div></div>`).join('');

  const auctions=[{id:'AUC-2026-051',date:'15-May-2026'},{id:'AUC-2026-048',date:'05-May-2026'},{id:'AUC-2026-041',date:'25-Apr-2026'}];
  const auctionRows=auctions.map(a=>{
    const rows=DEMANDS.filter(d=>d.auctionId===a.id);
    const hammer=rows.reduce((s,d)=>s+d.hammer,0);
    const emdTotal=rows.reduce((s,d)=>s+d.emd,0);
    const balColl=rows.filter(d=>d.status==='paid').reduce((s,d)=>s+d.balancePaid,0)+rows.filter(d=>d.status==='partial').reduce((s,d)=>s+d.balancePaid,0);
    const totalColl=emdTotal+balColl;
    const pct=Math.round(totalColl/hammer*100);
    return `<tr><td><strong>${a.id}</strong></td><td>${a.date}</td><td>${rows.length}</td><td>${pcFmtL(hammer)}</td><td>${pcFmtL(emdTotal)}</td><td>${pcFmtL(balColl)}</td><td style="color:var(--green);font-weight:600">${pcFmtL(totalColl)}</td><td style="color:var(--red);font-weight:600">${pcFmtL(hammer-totalColl)}</td><td><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="width:70px"><div class="progress-fill" style="width:${pct}%;background:var(--green)"></div></div>${pct}%</div></td></tr>`;
  }).join('');

  const platforms=['Bidkaro','eDiig','CarTrade','CarDekho'];
  const avgDays={Bidkaro:null,eDiig:3.5,CarTrade:2.8,CarDekho:4.0};
  const platPerfRows=platforms.map(p=>{
    const rows=DEMANDS.filter(d=>d.platform===p);
    const hammer=rows.reduce((s,d)=>s+d.hammer,0);
    const coll=rows.filter(d=>d.status==='paid').reduce((s,d)=>s+d.balancePaid+d.emd,0);
    const pct=hammer>0?Math.round(coll/hammer*100):0;
    const avg=avgDays[p];
    const statusColor=pct>=50?'var(--green)':'var(--red)';
    return `<tr><td>${pcPlatformBadge(p)}</td><td>${rows.length}</td><td>${pcFmtL(hammer)}</td><td style="color:var(--green);font-weight:600">${pcFmtL(coll)}</td><td><span style="color:${statusColor};font-weight:700">${pct}%</span></td><td>${avg?avg+' days':'—'}</td><td><span class="badge" style="background:${pct>=50?'var(--green-bg)':'var(--red-bg)'};color:${pct>=50?'var(--green)':'var(--red)'};">${pct>=50?'On Track':'Below Target'}</span></td></tr>`;
  }).join('');

  pg.innerHTML=`
    <div class="page-title">Reports &amp; Analytics</div>
    <div class="page-desc">Executive summary of auction collection performance by platform, vehicle type, and timeline.</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">${statBoxes}</div>
    <div class="grid-2" style="margin-bottom:20px">
      <div class="card">
        <div class="card-title"><i class="bi bi-bar-chart-fill"></i> Collection by Platform</div>
        <div class="chart-wrap"><canvas id="pc-chartRptPlatform"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="bi bi-pie-chart-fill"></i> Status Breakdown</div>
        <div class="chart-wrap"><canvas id="pc-chartRptStatus"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-title"><i class="bi bi-table"></i> Auction-wise Summary</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Auction ID</th><th>Auction Date</th><th>No. of Lots</th><th>Total Hammer Value</th><th>EMD Collected</th><th>Balance Collected</th><th>Total Collected</th><th>Outstanding</th><th>Collection %</th></tr></thead>
          <tbody>${auctionRows}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><i class="bi bi-graph-up-arrow"></i> Platform Performance Analysis</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Platform</th><th>Total Lots</th><th>Total Hammer Value</th><th>Collected</th><th>Collection %</th><th>Avg. Days to Pay</th><th>Status</th></tr></thead>
          <tbody>${platPerfRows}</tbody>
        </table>
      </div>
    </div>
    <div class="page-footer">HDFC Bank — Asset Recovery Division | PayCollect v2.0 | Data as of 23-May-2026</div>
  `;

  if(pcCharts.rptPlatform) pcCharts.rptPlatform.destroy();
  if(pcCharts.rptStatus) pcCharts.rptStatus.destroy();
  setTimeout(()=>{
    const ctx1=document.getElementById('pc-chartRptPlatform');
    const ctx2=document.getElementById('pc-chartRptStatus');
    if(ctx1){
      const platCollected=platforms.map(p=>{const rows=DEMANDS.filter(d=>d.platform===p&&d.status==='paid');return rows.reduce((s,d)=>s+d.balancePaid+d.emd,0);});
      pcCharts.rptPlatform=new Chart(ctx1,{type:'bar',data:{labels:platforms,datasets:[
        {label:'Hammer Value',data:platforms.map(p=>DEMANDS.filter(d=>d.platform===p).reduce((s,d)=>s+d.hammer,0)),backgroundColor:'rgba(31,78,121,.2)',borderColor:'#1F4E79',borderWidth:2,borderRadius:4},
        {label:'Collected',data:platCollected,backgroundColor:['rgba(26,86,219,.8)','rgba(15,118,110,.8)','rgba(194,65,12,.8)','rgba(185,28,28,.8)'],borderRadius:4}
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{font:{size:12}}}},scales:{y:{ticks:{callback:v=>'₹'+v.toLocaleString('en-IN')},grid:{color:'#f1f5f9'}},x:{grid:{display:false}}}}});
    }
    if(ctx2){
      const sc={paid:0,pending:0,overdue:0,partial:0};
      DEMANDS.forEach(d=>sc[d.status]++);
      pcCharts.rptStatus=new Chart(ctx2,{type:'doughnut',data:{labels:['Paid (7)','Pending (3)','Overdue (12)','Partial (2)'],datasets:[{data:[sc.paid,sc.pending,sc.overdue,sc.partial],backgroundColor:['#16a34a','#2563eb','#dc2626','#d97706'],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:12}}}}}});
    }
  },50);
}

      </div>

        <label class="form-label">Payment Mode</label>

      <textarea class="form-control" id="pc-pay-remarks" rows="2" placeholder="Optional remarks..."></textarea>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:10px">
      <button class="btn btn-outline" onclick="cM()">Cancel</button>
      <button class="btn btn-success" onclick="submitPCPayment()"><i class="bi bi-check-circle"></i> Mark as Paid</button>
    </div>
  `);
}

function submitPCPayment(){
  const d=DEMANDS.find(x=>x.id===pcPayId);
  if(!d)return;
  const amt=parseInt(document.getElementById('pc-pay-amount').value)||0;
  const mode=document.getElementById('pc-pay-mode').value;
  const utr=document.getElementById('pc-pay-utr').value;
  const date=document.getElementById('pc-pay-date').value;
  const remarks=document.getElementById('pc-pay-remarks').value;
  if(!amt){toast('Please enter a valid amount.');return;}
  if(!utr){toast('Please enter UTR / Reference number.');return;}
  d.balancePaid+=amt;
  d.balanceDue=Math.max(0,d.balanceDue-amt);
  d.payMode=mode;
  d.utr=utr;
  d.paidDate=date;
  d.remarks=remarks;
  d.status=d.balanceDue===0?'paid':'partial';
  if(d.status==='paid') d.rc='In Progress';
  cM();
  toast('Payment of '+pcFmt(amt)+' recorded for '+d.buyer+'.');
  renderPCTrackerTable();
}

function rRelease(){
  document.getElementById('pg-release').innerHTML = `
    <div class="page-title">Vehicle Release &amp; Handover</div>
    <div class="page-desc">Audit loan closures, issue No-Objection Certificates (NOC), complete physical keys handover, and verify RTO Registration Certificate (RC) transfers</div>
    
    <div class="card" style="margin-top:14px">
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Release ID</th>
              <th>Vehicle No.</th>
              <th>Authorized Buyer</th>
              <th>Final Hammer Price</th>
              <th>Escrow Payment</th>
              <th>NOC Certificate</th>
              <th>RC Transfer</th>
              <th>Physical Handover</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${REL.map(function(r){
              const v=gv(r.vi);
              let acts='';
              if(r.hv==='Not Started'&&r.id==='REL002'){
                acts='<button class="btn btn-primary btn-xs" id="gro-btn" onclick="genRO(\''+r.id+'\')"><i class="bi bi-file-earmark-richtext"></i> Issue Release Order</button>';
              }
              else if(r.hv==='In Progress'&&r.id==='REL002'){
                acts='<button class="btn btn-success btn-xs" onclick="hvConf(\''+r.id+'\')"><i class="bi bi-person-check"></i> Complete Handover</button>';
              }
              else if(r.hv==='Complete'){
                acts='<button class="btn btn-outline btn-xs" onclick="toast(\'Release dossier downloaded\')"><i class="bi bi-file-zip"></i> Download Dossier</button>';
              }
              return `
                <tr id="rel-${r.id}">
                  <td><b>${r.id}</b></td>
                  <td><span class="vc-reg">${v.n||'—'}</span></td>
                  <td><strong>${r.buyer}</strong></td>
                  <td><strong>${fmt(r.am)}</strong></td>
                  <td>${sbg(r.ps==='Paid'?'Complete':'Not Started')}</td>
                  <td>${sbg(r.ns)}</td>
                  <td>${sbg(r.rc)}</td>
                  <td>${sbg(r.hv)}</td>
